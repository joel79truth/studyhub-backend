<style>
  :root {
    --primary: #0c325e;
    --primary-hover: #1e4a7a;
    --bg-main: #f8fafc;
    --bg-card: #ffffff;
    --text-main: #0f172a;
    --text-muted: #64748b;
    --border: #e2e8f0;
  }

  * { margin:0; padding:0; box-sizing:border-box; font-family:'Inter',sans-serif; -webkit-tap-highlight-color:transparent; }
  body { background:var(--bg-main); color:var(--text-main); min-height:100vh; padding-top:80px; }

  header {
    position:fixed; top:0; left:0; right:0;
    background:rgba(255,255,255,0.95); backdrop-filter:blur(12px);
    border-bottom:1px solid var(--border); z-index:100;
    padding:12px 20px; display:flex; flex-direction:column; gap:12px;
  }
  .header-top { display:flex; justify-content:space-between; align-items:center; }
  .header-title { display:flex; align-items:center; gap:12px; }
  .logo {
    width:40px; height:40px; background:var(--primary); border-radius:10px;
    display:flex; align-items:center; justify-content:center;
    font-size:18px; font-weight:800; color:white; box-shadow:0 4px 12px rgba(12,50,94,0.3);
  }
  .header-title h1 { font-size:1.2rem; font-weight:700; }
  .search-container { position:relative; width:100%; }
  .search-input {
    width:100%; padding:12px 16px 12px 40px; border:1px solid var(--border);
    border-radius:12px; font-size:14px; background:white; transition:all 0.2s;
  }
  .search-input:focus { border-color:var(--primary); box-shadow:0 0 0 3px rgba(12,50,94,0.1); outline:none; }
  .search-icon { position:absolute; left:14px; top:50%; transform:translateY(-50%); opacity:0.5; }

  .fab-container {
    position:fixed; bottom:24px; right:24px; z-index:200;
    display:flex; flex-direction:column; align-items:center; gap:8px;
  }
  .fab {
    width:56px; height:56px; border-radius:50%; background:var(--primary);
    color:white; border:none; font-size:24px; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 4px 12px rgba(12,50,94,0.4); transition:transform 0.2s;
  }
  .fab:active { transform:scale(0.95); }
  .fab-label { font-size:11px; font-weight:600; background:rgba(255,255,255,0.9); padding:4px 8px; border-radius:20px; backdrop-filter:blur(4px); }

  .breadcrumb { padding:0 20px; margin:20px 0; display:none; align-items:center; gap:12px; }
  .breadcrumb.active { display:flex; }
  .breadcrumb button { background:white; padding:8px 14px; font-size:13px; font-weight:600; border:1px solid var(--border); border-radius:8px; cursor:pointer; }
  .breadcrumb-text { color:var(--text-muted); font-size:14px; }

  .modal {
    display:none; position:fixed; top:0; left:0; width:100%; height:100%;
    background:rgba(0,0,0,0.6); backdrop-filter:blur(4px);
    justify-content:center; align-items:center; z-index:1000; overflow-y:auto;
  }
  .modal.active { display:flex; }
  .modal-content {
    background:white; padding:24px; border-radius:24px;
    width:90%; max-width:550px; max-height:85vh; overflow-y:auto; margin:20px;
  }
  .modal-content h3 { font-size:1.4rem; margin-bottom:20px; font-weight:700; }

  .form-group { margin-bottom:20px; }
  .form-group label { display:block; margin-bottom:6px; font-weight:600; font-size:14px; }
  input, select { width:100%; padding:12px; border:1px solid var(--border); border-radius:12px; font-size:14px; }

  .file-upload-zone {
    padding:28px 20px; border:2px dashed var(--border); background:var(--bg-main);
    border-radius:16px; text-align:center; cursor:pointer; transition:all 0.2s;
  }
  .file-upload-zone.dragover { border-color:var(--primary); background:#e0e7ff; }
  #fileInput { display:none; }
  .upload-icon { font-size:36px; margin-bottom:8px; }
  .upload-text { font-weight:600; }
  .upload-subtext { font-size:12px; color:var(--text-muted); }

  .file-preview-container {
    display:grid; grid-template-columns:repeat(auto-fill, minmax(130px,1fr)); gap:12px; margin-top:16px;
  }
  .file-preview {
    position:relative; border:1px solid var(--border); border-radius:12px;
    padding:8px; background:var(--bg-main);
  }
  .file-preview-icon {
    width:100%; height:90px; display:flex; align-items:center; justify-content:center;
    background:#e0e7ff; border-radius:8px; font-size:32px;
  }
  .file-preview-name { font-size:11px; margin-top:6px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .file-preview-remove {
    position:absolute; top:4px; right:4px; background:#ef4444; color:white;
    border:none; border-radius:50%; width:24px; height:24px; font-size:14px; cursor:pointer;
  }

  .modal-actions { display:flex; gap:12px; margin-top:20px; }
  .btn-primary { background:var(--primary); color:white; border:none; padding:12px; border-radius:12px; font-weight:600; cursor:pointer; }
  .btn-secondary { background:var(--bg-main); border:1px solid var(--border); padding:12px; border-radius:12px; font-weight:600; cursor:pointer; }
  .btn-primary:disabled { opacity:0.5; cursor:not-allowed; }

  /* Cards grid */
  .cards { padding:0 20px 80px; display:grid; grid-template-columns:repeat(auto-fill, minmax(320px,1fr)); gap:24px; max-width:1400px; margin:0 auto; }
  .card {
    background:var(--bg-card); border:1px solid var(--border); border-radius:20px;
    overflow:hidden; box-shadow:0 4px 6px -2px rgba(0,0,0,0.05);
    transition:transform 0.2s, box-shadow 0.2s;
  }
  .card:hover { transform:translateY(-4px); box-shadow:0 12px 20px -8px rgba(0,0,0,0.1); }

  .card-preview {
    width:100%; height:180px; background:#e2e8f0; position:relative; cursor:pointer; overflow:hidden;
  }
  .card-preview img { width:100%; height:100%; object-fit:cover; transition:transform 0.3s; }
  .card:hover .card-preview img { transform:scale(1.03); }
  .card-badge {
    position:absolute; top:12px; left:12px; background:rgba(255,255,255,0.9);
    backdrop-filter:blur(4px); padding:4px 10px; border-radius:20px;
    font-size:11px; font-weight:800; color:var(--primary); z-index:2;
  }

  .thumbnails { display:flex; gap:8px; padding:12px 16px 0; overflow-x:auto; scrollbar-width:thin; }
  .thumb {
    width:50px; height:50px; border-radius:10px; overflow:hidden; cursor:pointer;
    border:2px solid transparent; flex-shrink:0; background:#e2e8f0; position:relative;
  }
  .thumb.active { border-color:var(--primary); }
  .thumb img { width:100%; height:100%; object-fit:cover; }
  .thumb-label {
    position:absolute; bottom:0; left:0; right:0; background:rgba(0,0,0,0.6);
    color:white; font-size:8px; text-align:center; padding:2px;
  }

  .card-content { padding:16px; }
  .card-title { font-size:1.1rem; font-weight:800; margin-bottom:6px; }
  .card-meta { font-size:11px; color:var(--text-muted); margin-bottom:12px; display:flex; gap:12px; font-weight:600; }
  .card-actions { display:flex; justify-content:space-between; align-items:center; margin-top:12px; }
  .stats { display:flex; gap:12px; font-size:13px; font-weight:600; color:var(--text-muted); }
  .like-button { background:none; border:none; display:flex; align-items:center; gap:4px; cursor:pointer; font-weight:600; }
  .like-button.liked { color:#ef4444; }
  .btn-download {
    background:#eef2ff; color:var(--primary); border:none; padding:8px 14px; border-radius:40px;
    font-weight:700; font-size:13px; cursor:pointer; transition:all 0.2s;
  }
  .btn-download:hover { background:var(--primary); color:white; }

  .grid-card {
    background:white; border:1px solid var(--border); border-radius:20px;
    padding:20px; display:flex; align-items:center; gap:16px; cursor:pointer; transition:all 0.2s;
  }
  .grid-card:hover { border-color:var(--primary); transform:translateY(-2px); }
  .grid-icon {
    width:52px; height:52px; background:#e0e7ff; color:var(--primary);
    border-radius:16px; display:flex; align-items:center; justify-content:center; font-size:24px;
  }

  .toast {
    position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(100px);
    background:#10b981; color:white; padding:12px 24px; border-radius:40px;
    font-weight:600; z-index:2000; transition:all 0.3s cubic-bezier(0.68,-0.55,0.265,1.55);
    opacity:0; pointer-events:none;
  }
  .toast.active { transform:translateX(-50%) translateY(0); opacity:1; }
  .toast.error { background:#ef4444; }

  .batch-list { max-height:400px; overflow-y:auto; margin:16px 0; }
  .batch-item { display:flex; align-items:center; gap:12px; padding:12px; border-bottom:1px solid var(--border); }
  .batch-item img { width:48px; height:48px; object-fit:cover; border-radius:8px; background:#e2e8f0; }
  .batch-item-info { flex:1; }
  .batch-item-title { font-weight:600; font-size:14px; }
  .batch-item-type { font-size:11px; color:var(--text-muted); }
  .select-all { margin-bottom:12px; padding:8px; background:#f1f5f9; border-radius:12px; display:flex; align-items:center; gap:8px; font-weight:600; }

  @media (min-width:768px) {
    header { flex-direction:row; align-items:center; justify-content:space-between; padding:16px 40px; }
    .search-container { width:300px; }
    body { padding-top:90px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <div class="header-title"><div class="logo">📚</div><h1>Past Papers</h1></div>
  </div>
  <div class="search-container"><span class="search-icon">🔍</span><input type="text" class="search-input" id="searchInput" placeholder="Search courses, exams..."></div>
</header>

<div class="fab-container"><button class="fab" id="addPaperBtn">+</button><span class="fab-label">Add Paper</span></div>
<div class="breadcrumb" id="breadcrumb"><button id="backBtn">← Back</button><span class="breadcrumb-text" id="breadcrumbText"></span></div>
<div class="cards" id="container"><div style="text-align:center; padding:40px;">📄 Loading papers...</div></div>

<!-- Upload Modal -->
<div class="modal" id="uploadModal"><div class="modal-content">
  <h3>📤 Upload Past Paper</h3>
  <div class="form-group">
    <label>Program *</label>
    <select id="programSelect" required><option value="">-- Select Program --</option></select>
  </div>
  <div class="form-group"><label>Course *</label><input type="text" id="courseInput" placeholder="e.g., Crop Production"></div>
  <div class="form-group"><label>Exam Type *</label><input type="text" id="midInput" placeholder="e.g., Mid Sem, Final"></div>
  <div class="form-group"><label>Semester *</label><select id="semesterInput">
    <option value="">Select</option>
    <option>Semester 1</option><option>Semester 2</option><option>Semester 3</option>
    <option>Semester 4</option><option>Semester 5</option><option>Semester 6</option>
  </select></div>
  <div class="form-group">
    <label>Files (Max 7, up to 10MB each)</label>
    <div class="file-upload-zone" id="fileUploadZone">
      <div class="upload-icon">📁</div>
      <div class="upload-text">Tap or drag files</div>
      <div class="upload-subtext">PDF, DOCX, PPTX, Images</div>
    </div>
    <input type="file" id="fileInput" accept=".pdf,.docx,.pptx,image/*" multiple>
  </div>
  <div id="filePreviewContainer" class="file-preview-container"></div>
  <div class="modal-actions">
    <button class="btn-primary" id="uploadBtn" onclick="window.uploadPapers()">Upload</button>
    <button class="btn-secondary" onclick="closeModal()">Cancel</button>
  </div>
</div></div>

<!-- Batch Download Modal -->
<div class="modal" id="batchModal"><div class="modal-content">
  <h3>📥 Select files to save</h3>
  <div class="select-all"><input type="checkbox" id="selectAllCheckbox"> <label for="selectAllCheckbox"><strong>Select All</strong></label></div>
  <div id="batchListContainer" class="batch-list"></div>
  <div class="modal-actions"><button class="btn-primary" id="downloadSelectedBtn">Download Selected</button><button class="btn-secondary" onclick="closeBatchModal()">Cancel</button></div>
</div></div>

<div class="toast" id="toast">✓ Done</div>

<script>
  (function(){
    const supabaseUrl = 'https://qosudbigoxwzbdqkdecz.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFvc3VkYmlnb3h3emJkcWtkZWN6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTc3NDU3NDMsImV4cCI6MjA3MzMyMTc0M30.B4ITihJkyALUSahDgGNgta6tivR7siBy7wM8KKb6JVQ';
    const client = supabase.createClient(supabaseUrl, supabaseKey);

    const container = document.getElementById('container');
    const breadcrumb = document.getElementById('breadcrumb');
    const breadcrumbText = document.getElementById('breadcrumbText');
    const backBtn = document.getElementById('backBtn');
    const searchInput = document.getElementById('searchInput');
    const toast = document.getElementById('toast');
    const addPaperBtn = document.getElementById('addPaperBtn');
    const uploadModal = document.getElementById('uploadModal');
    const fileUploadZone = document.getElementById('fileUploadZone');
    const fileInput = document.getElementById('fileInput');
    const filePreviewContainer = document.getElementById('filePreviewContainer');
    const programSelect = document.getElementById('programSelect');

    let currentView = 'programs';
    let currentProgram = null, currentSemester = null;
    let allData = [];
    let searchQuery = '';
    let selectedFiles = [];
    let likedPapers = JSON.parse(localStorage.getItem('likedPapers') || '{}');
    const activeThumbs = {};

    // Optimized Supabase image URL
    function getOptimizedImageUrl(url, width, height, quality=80) {
      if (!url) return '';
      const sep = url.includes('?') ? '&' : '?';
      return `${url}${sep}width=${width}&height=${height}&resize=cover&quality=${quality}`;
    }

    function createFastImage(src, alt, w, h, className='', isPriority=false) {
      const img = new Image();
      img.src = getOptimizedImageUrl(src, w, h);
      img.alt = alt || '';
      img.loading = isPriority ? 'eager' : 'lazy';
      img.fetchPriority = isPriority ? 'high' : 'auto';
      if (className) img.className = className;
      img.style.width='100%'; img.style.height='100%'; img.style.objectFit='cover';
      return img;
    }

    // Fetch programs for dropdown
    async function fetchProgramsDropdown() {
      try {
        const { data, error } = await client.from('programs').select('name').order('name');
        if (error) throw error;
        if (data && data.length) {
          programSelect.innerHTML = '<option value="">-- Select Program --</option>';
          data.forEach(p => {
            const opt = document.createElement('option');
            opt.value = p.name; opt.textContent = p.name;
            programSelect.appendChild(opt);
          });
        } else {
          const { data: papersData } = await client.from('past_papers').select('program');
          const unique = [...new Set(papersData?.map(p=>p.program).filter(Boolean))];
          if (unique.length) {
            unique.forEach(p => programSelect.appendChild(new Option(p, p)));
          } else {
            programSelect.innerHTML = '<option value="">No programs available</option>';
          }
        }
      } catch (err) {
        console.error("Programs load error:", err);
        programSelect.innerHTML = '<option value="">Error loading programs</option>';
      }
    }

    // -------- FILE HANDLING (NO IMAGE DECODING) ---------
    function handleFiles(files) {
      const maxFiles = 7, maxSize = 10*1024*1024;
      if (selectedFiles.length + files.length > maxFiles) {
        showToast(`Max ${maxFiles} files`, true);
        return;
      }
      Array.from(files).forEach(file => {
        if (file.size > maxSize) { showToast(`${file.name} >10MB`, true); return; }
        if (selectedFiles.length >= maxFiles) return;
        selectedFiles.push({
          file,
          name: file.name,
          size: file.size,
          type: file.type,
          id: Date.now() + Math.random()
        });
      });
      renderFilePreviews();
    }

    function renderFilePreviews() {
      filePreviewContainer.innerHTML = '';
      selectedFiles.forEach((f, idx) => {
        const div = document.createElement('div'); div.className = 'file-preview';
        const icon = f.type.startsWith('image/') ? '🖼️' : '📄';
        div.innerHTML = `
          <div class="file-preview-icon">${icon}</div>
          <div class="file-preview-name">${f.name.length>20 ? f.name.slice(0,18)+'..' : f.name}</div>
          <button class="file-preview-remove" onclick="window.removeFile(${idx})">×</button>
        `;
        filePreviewContainer.appendChild(div);
      });
      const uploadBtn = document.getElementById('uploadBtn');
      uploadBtn.disabled = selectedFiles.length === 0;
      uploadBtn.textContent = selectedFiles.length ? `Upload ${selectedFiles.length} file(s)` : 'Upload';
    }

    window.removeFile = (idx) => {
      selectedFiles.splice(idx, 1);
      renderFilePreviews();
    };

    function closeModal() {
      selectedFiles = [];
      uploadModal.classList.remove('active');
      document.getElementById('courseInput').value = '';
      document.getElementById('midInput').value = '';
      document.getElementById('semesterInput').value = '';
      programSelect.value = '';
      fileInput.value = '';
      renderFilePreviews();
    }

    // -------- SMART UPLOAD: stays on same view after success --------
    window.uploadPapers = async function() {
      const program = programSelect.value.trim();
      const course = document.getElementById('courseInput').value.trim();
      const mid = document.getElementById('midInput').value.trim();
      const semester = document.getElementById('semesterInput').value;

      if (!program || !course || !mid || !semester || selectedFiles.length===0) {
        showToast("All fields required", true);
        return;
      }

      const uploadBtn = document.getElementById('uploadBtn');
      uploadBtn.disabled = true;
      uploadBtn.textContent = `Uploading 0/${selectedFiles.length}...`;
      let success = 0;

      try {
        for (let i = 0; i < selectedFiles.length; i++) {
          const f = selectedFiles[i];
          const ext = f.name.split('.').pop();
          const fileName = `${Date.now()}_${i}_${f.name}`;
          const filePath = `${program}/${course}/${semester}/${fileName}`;

          const { error: upErr } = await client.storage.from('past-paper').upload(filePath, f.file);
          if (upErr) throw upErr;

          const file_url = client.storage.from('past-paper').getPublicUrl(filePath).data.publicUrl;
          const { error: insErr } = await client.from('past_papers').insert([{
            program, course, semester, Mid: mid,
            file_name: fileName, file_url, file_type: ext,
            views: 0, likes: 0
          }]);
          if (insErr) throw insErr;
          success++;
          uploadBtn.textContent = `Uploading ${success}/${selectedFiles.length}...`;
        }

        showToast(`✅ ${success} file(s) uploaded!`);
        closeModal();

        // Refresh data, then return to the current view (not programs)
        await loadData();
        stayOnCurrentView();

      } catch(e) {
        showToast("Upload failed: " + e.message, true);
      } finally {
        uploadBtn.disabled = false;
        uploadBtn.textContent = 'Upload';
      }
    };

    // Returns to the last visited view after data refresh
    function stayOnCurrentView() {
      if (currentView === 'papers' && currentProgram && currentSemester) {
        renderPapers(currentProgram, currentSemester);
      } else if (currentView === '
