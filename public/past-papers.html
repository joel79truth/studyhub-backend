<script>
  (function(){
    const supabaseUrl = 'https://qosudbigoxwzbdqkdecz.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFvc3VkYmlnb3h3emJkcWtkZWN6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTc3NDU3NDMsImV4cCI6MjA3MzMyMTc0M30.B4ITihJkyALUSahDgGNgta6tivR7siBy7wM8KKb6JVQ';
    const client = supabase.createClient(supabaseUrl, supabaseKey);
    
    // DOM elements
    const container = document.getElementById('container');
    const breadcrumb = document.getElementById('breadcrumb');
    const breadcrumbText = document.getElementById('breadcrumbText');
    const backBtn = document.getElementById('backBtn');
    const searchInput = document.getElementById('searchInput');
    const toast = document.getElementById('toast');
    const addPaperBtn = document.getElementById('addPaperBtn');
    const uploadModal = document.getElementById('uploadModal');
    const fileUploadZone = document.getElementById('fileUploadZone');
    const fileInput = document.getElementById('fileInput');
    const filePreviewContainer = document.getElementById('filePreviewContainer');
    const programSelect = document.getElementById('programSelect');
    
    let currentView = 'programs';
    let currentProgram = null, currentSemester = null;
    let allData = [];
    let searchQuery = '';
    let selectedFiles = [];
    let likedPapers = JSON.parse(localStorage.getItem('likedPapers') || '{}');
    const activeThumbs = {};
    
    // Image processing queue - process ONE image at a time
    let processingQueue = false;
    let pendingImages = [];
    
    // Helper: Optimized image URL
    function getOptimizedImageUrl(url, width, height) {
      if (!url) return '';
      const separator = url.includes('?') ? '&' : '?';
      return `${url}${separator}width=${width}&height=${height}&resize=cover&quality=75`;
    }
    
    function createFastImage(src, alt, width, height, className) {
      const img = new Image();
      img.src = getOptimizedImageUrl(src, width, height);
      img.alt = alt || '';
      img.loading = 'lazy';
      if (className) img.className = className;
      img.style.width = '100%';
      img.style.height = '100%';
      img.style.objectFit = 'cover';
      return img;
    }
    
    // Fetch programs for dropdown
    async function fetchProgramsDropdown() {
      try {
        const { data, error } = await client.from('programs').select('name').order('name');
        if (error) throw error;
        if (data && data.length > 0) {
          programSelect.innerHTML = '<option value="">-- Select Program --</option>';
          data.forEach(prog => {
            const option = document.createElement('option');
            option.value = prog.name;
            option.textContent = prog.name;
            programSelect.appendChild(option);
          });
        } else {
          const { data: papersData } = await client.from('past_papers').select('program');
          const unique = [...new Set(papersData?.map(p => p.program).filter(Boolean))];
          if(unique.length) {
            unique.forEach(p => { const opt = document.createElement('option'); opt.value = p; opt.textContent = p; programSelect.appendChild(opt); });
          } else {
            programSelect.innerHTML = '<option value="">No programs available</option>';
          }
        }
      } catch (err) {
        console.error("Failed to load programs:", err);
        programSelect.innerHTML = '<option value="">Error loading programs</option>';
      }
    }
    
    // ========== MEMORY-SAFE IMAGE PROCESSING (NO FILE READER) ==========
    function handleFiles(files) {
      const maxFiles = 5; // reduced to 5 for safety
      const maxSize = 10 * 1024 * 1024;
      const newFiles = Array.from(files).filter(f => {
        if (selectedFiles.length >= maxFiles) {
          showToast(`Max ${maxFiles} files`, true);
          return false;
        }
        if (f.size > maxSize) {
          showToast(`${f.name} >10MB`, true);
          return false;
        }
        return true;
      });
      
      for (const file of newFiles) {
        const fileData = {
          file: file,
          name: file.name,
          size: file.size,
          type: file.type,
          thumbnail: null,
          verified: file.type.startsWith('image/') ? 'checking' : 'verified',
          id: Date.now() + Math.random()
        };
        selectedFiles.push(fileData);
        if (file.type.startsWith('image/')) {
          pendingImages.push(fileData);
        }
      }
      renderFilePreviews();
      processNextImage();
    }
    
    async function processNextImage() {
      if (processingQueue) return;
      if (pendingImages.length === 0) return;
      processingQueue = true;
      const fileData = pendingImages.shift();
      try {
        // Create blob URL and load image
        const blobUrl = URL.createObjectURL(fileData.file);
        const img = new Image();
        await new Promise((resolve, reject) => {
          img.onload = resolve;
          img.onerror = reject;
          img.src = blobUrl;
        });
        
        // Verify aspect ratio (simple check)
        const aspect = img.width / img.height;
        const isValid = (aspect > 0.6 && aspect < 1.5) || img.width > 800;
        fileData.verified = isValid ? 'verified' : 'invalid';
        
        // Generate small thumbnail (max 150px)
        const canvas = document.createElement('canvas');
        let tw = img.width, th = img.height;
        const maxDim = 150;
        if (tw > maxDim) {
          th = (th * maxDim) / tw;
          tw = maxDim;
        }
        canvas.width = tw;
        canvas.height = th;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, tw, th);
        fileData.thumbnail = canvas.toDataURL('image/jpeg', 0.6);
        
        // Resize original image to max 1200px using canvas (no FileReader)
        let width = img.width, height = img.height;
        const maxWidth = 1200, maxHeight = 1200;
        if (width > height && width > maxWidth) {
          height *= maxWidth / width;
          width = maxWidth;
        } else if (height > maxHeight) {
          width *= maxHeight / height;
          height = maxHeight;
        }
        const resizeCanvas = document.createElement('canvas');
        resizeCanvas.width = width;
        resizeCanvas.height = height;
        const resizeCtx = resizeCanvas.getContext('2d');
        resizeCtx.drawImage(img, 0, 0, width, height);
        const resizedBlob = await new Promise(resolve => {
          resizeCanvas.toBlob(blob => resolve(blob), 'image/jpeg', 0.8);
        });
        if (resizedBlob) {
          fileData.file = resizedBlob;
          fileData.size = resizedBlob.size;
        }
        
        // Cleanup
        URL.revokeObjectURL(blobUrl);
        img.src = '';
      } catch (err) {
        console.error('Image processing failed', err);
        fileData.verified = 'invalid';
      } finally {
        processingQueue = false;
        renderFilePreviews();
        processNextImage(); // process next in queue
      }
    }
    
    function renderFilePreviews() {
      filePreviewContainer.innerHTML = '';
      selectedFiles.forEach((f, idx) => {
        const div = document.createElement('div');
        div.className = 'file-preview';
        let thumbHtml = f.thumbnail
          ? `<img src="${f.thumbnail}" class="file-preview-thumb">`
          : (f.type?.startsWith('image/')
            ? `<div class="file-preview-thumb" style="background:#cbd5e1; display:flex;align-items:center;justify-content:center;">⏳</div>`
            : `<div class="file-preview-thumb" style="background:#e0e7ff; display:flex;align-items:center;justify-content:center;">📄</div>`);
        let statusClass = '', statusText = '';
        if (f.type?.startsWith('image/')) {
          if (f.verified === 'checking') { statusClass = 'status-checking'; statusText = 'Processing...'; }
          else if (f.verified === 'verified') { statusClass = 'status-verified'; statusText = '✓ Ready'; }
          else { statusClass = 'status-invalid'; statusText = '✗ Invalid'; }
        } else {
          statusClass = 'status-verified'; statusText = '✓ Ready';
        }
        div.innerHTML = `${thumbHtml}<div class="file-preview-name">${f.name.length > 20 ? f.name.slice(0, 18) + '..' : f.name}</div><div class="status-badge ${statusClass}">${statusText}</div><button class="file-preview-remove" data-idx="${idx}">×</button>`;
        filePreviewContainer.appendChild(div);
      });
      // Attach remove handlers
      document.querySelectorAll('.file-preview-remove').forEach(btn => {
        btn.onclick = (e) => {
          const idx = parseInt(btn.dataset.idx);
          if (!isNaN(idx) && selectedFiles[idx]) {
            // Remove from pending queue if still there
            const removed = selectedFiles[idx];
            const pendingIndex = pendingImages.findIndex(p => p.id === removed.id);
            if (pendingIndex !== -1) pendingImages.splice(pendingIndex, 1);
            selectedFiles.splice(idx, 1);
            renderFilePreviews();
          }
        };
      });
      const uploadBtn = document.getElementById('uploadBtn');
      const hasInvalid = selectedFiles.some(f => f.verified === 'invalid');
      const checking = selectedFiles.some(f => f.verified === 'checking');
      uploadBtn.disabled = hasInvalid || checking || selectedFiles.length === 0;
      uploadBtn.textContent = hasInvalid ? 'Remove invalid images' : (checking ? 'Processing images...' : `Upload ${selectedFiles.length} file(s)`);
    }
    
    function closeModal() {
      // Cancel any pending processing
      processingQueue = false;
      pendingImages = [];
      // Revoke any blob URLs (none left, but clear references)
      selectedFiles = [];
      uploadModal.classList.remove('active');
      document.getElementById('courseInput').value = '';
      document.getElementById('midInput').value = '';
      document.getElementById('semesterInput').value = '';
      programSelect.value = '';
      fileInput.value = '';
      renderFilePreviews();
    }
    
    async function uploadPapers() {
      const program = programSelect.value.trim();
      const course = document.getElementById('courseInput').value.trim();
      const mid = document.getElementById('midInput').value.trim();
      const semester = document.getElementById('semesterInput').value;
      if (!program || !course || !mid || !semester || selectedFiles.length === 0) {
        showToast("All fields required", true);
        return;
      }
      if (selectedFiles.some(f => f.verified === 'invalid')) {
        showToast("Remove invalid images", true);
        return;
      }
      const uploadBtn = document.getElementById('uploadBtn');
      uploadBtn.disabled = true;
      uploadBtn.textContent = `Uploading 0/${selectedFiles.length}...`;
      let success = 0;
      try {
        for (let i = 0; i < selectedFiles.length; i++) {
          const fd = selectedFiles[i];
          const ext = fd.name.split('.').pop();
          const fileName = `${Date.now()}_${i}_${fd.name}`;
          const filePath = `${program}/${course}/${semester}/${fileName}`;
          const { error: upErr } = await client.storage.from('past-paper').upload(filePath, fd.file);
          if (upErr) throw upErr;
          const file_url = client.storage.from('past-paper').getPublicUrl(filePath).data.publicUrl;
          const { error: insErr } = await client.from('past_papers').insert([{ program, course, semester, Mid: mid, file_name: fileName, file_url, file_type: ext, views:0, likes:0 }]);
          if (insErr) throw insErr;
          success++;
          uploadBtn.textContent = `Uploading ${success}/${selectedFiles.length}...`;
        }
        showToast(`✅ ${success} file(s) uploaded!`);
        closeModal();
        loadData();
      } catch(e) {
        showToast("Upload failed: " + e.message, true);
      } finally {
        uploadBtn.disabled = false;
        uploadBtn.textContent = 'Upload';
      }
    }
    
    // Camera capture with BACK camera
    async function takePhoto() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: { exact: "environment" } }  // back camera
        });
        const video = document.createElement('video');
        video.srcObject = stream;
        video.setAttribute('playsinline', '');
        await video.play();
        setTimeout(() => {
          const canvas = document.createElement('canvas');
          canvas.width = video.videoWidth;
          canvas.height = video.videoHeight;
          canvas.getContext('2d').drawImage(video, 0, 0);
          canvas.toBlob(blob => {
            const file = new File([blob], `camera_${Date.now()}.jpg`, { type: 'image/jpeg' });
            handleFiles([file]);
            stream.getTracks().forEach(track => track.stop());
          }, 'image/jpeg', 0.8);
        }, 500);
      } catch (err) {
        // fallback to default camera if back camera not available
        try {
          const stream = await navigator.mediaDevices.getUserMedia({ video: true });
          const video = document.createElement('video');
          video.srcObject = stream;
          video.setAttribute('playsinline', '');
          await video.play();
          setTimeout(() => {
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            canvas.toBlob(blob => {
              const file = new File([blob], `camera_${Date.now()}.jpg`, { type: 'image/jpeg' });
              handleFiles([file]);
              stream.getTracks().forEach(track => track.stop());
            }, 'image/jpeg', 0.8);
          }, 500);
        } catch(e) {
          showToast('Camera access denied', true);
        }
      }
    }
    
    // ========== REST OF YOUR EXISTING FUNCTIONS (loadData, renderPrograms, etc.) ==========
    async function loadData(){
      try {
        const { data, error } = await client.from('past_papers').select('*').order('uploaded_at',{ascending:false});
        if(error) throw error;
        allData = data || [];
        renderPrograms();
      } catch(err){
        container.innerHTML = `<div style="grid-column:1/-1;text-align:center;color:red;">Error: ${err.message}</div>`;
      }
    }
    
    function renderPrograms(){
      currentView='programs'; breadcrumb.classList.remove('active'); container.innerHTML='';
      let filtered = searchQuery ? allData.filter(d=>d.program?.toLowerCase().includes(searchQuery)) : allData;
      const progs = [...new Set(filtered.map(d=>d.program))];
      if(progs.length===0){ container.innerHTML=`<div style="grid-column:1/-1;text-align:center;padding:40px;">No programs</div>`; return; }
      progs.forEach(prog=>{
        const count = allData.filter(d=>d.program===prog).length;
        const el = document.createElement('div'); el.className='grid-card';
        el.innerHTML = `<div class="grid-icon">🎓</div><div class="grid-info"><h3>${prog}</h3><p>${count} papers</p></div>`;
        el.onclick = () => renderSemesters(prog);
        container.appendChild(el);
      });
    }
    
    function renderSemesters(program){
      currentProgram=program; currentView='semesters'; breadcrumb.classList.add('active'); breadcrumbText.textContent=program; container.innerHTML='';
      const sems = [...new Set(allData.filter(d=>d.program===program).map(d=>d.semester))];
      sems.forEach(sem=>{
        const count = allData.filter(d=>d.program===program && d.semester===sem).length;
        const el = document.createElement('div'); el.className='grid-card';
        el.innerHTML = `<div class="grid-icon">📅</div><div class="grid-info"><h3>${sem}</h3><p>${count} docs</p></div>`;
        el.onclick = () => renderPapers(program, sem);
        container.appendChild(el);
      });
    }
    
    function renderPapers(program, semester){
      currentSemester=semester; currentView='papers'; breadcrumbText.textContent=`${program} / ${semester}`; container.innerHTML='';
      let papers = allData.filter(d=>d.program===program && d.semester===semester);
      if(searchQuery) papers = papers.filter(p=>p.course?.toLowerCase().includes(searchQuery) || p.Mid?.toLowerCase().includes(searchQuery));
      const groups = {};
      papers.forEach(p=>{ if(!groups[p.course]) groups[p.course]=[]; groups[p.course].push(p); });
      const courses = Object.keys(groups);
      if(courses.length===0){ container.innerHTML=`<div style="text-align:center;padding:40px;">No papers</div>`; return; }
      courses.forEach((course, idx)=>{
        const group = groups[course];
        if(!activeThumbs[course]) activeThumbs[course]=0;
        const card = document.createElement('div'); card.className='card'; card.id=`card-${course.replace(/\s/g,'')}`;
        updateCardElement(card, course, group, idx<2);
        container.appendChild(card);
      });
    }
    
    function updateCardElement(cardEl, course, group, isPriority){
      const activeIdx = activeThumbs[course];
      const activePaper = group[activeIdx];
      const isLiked = likedPapers[activePaper.id] || false;
      const previewImg = createFastImage(activePaper.file_url, course, 400, 200, 'card-img');
      let thumbsHtml = '';
      if(group.length>1){
        thumbsHtml = `<div class="thumbnails">`;
        group.forEach((p,idx)=>{
          const thumbImg = createFastImage(p.file_url, p.Mid, 52, 52, '');
          thumbsHtml += `<div class="thumb ${idx===activeIdx?'active':''}" onclick="event.stopPropagation(); window.setActiveThumb('${course}', ${idx})">${thumbImg.outerHTML}<div class="thumb-label">${(p.Mid||'Exam').slice(0,8)}</div></div>`;
        });
        thumbsHtml += `</div>`;
      }
      cardEl.innerHTML = `
        <div class="card-preview" onclick="window.open('${activePaper.file_url}','_blank')"><div class="card-badge">${activePaper.Mid||'Exam'}</div>${previewImg.outerHTML}</div>
        ${thumbsHtml}
        <div class="card-content">
          <h3 class="card-title">${course}</h3>
          <div class="card-meta"><span>${(activePaper.file_type||'file').toUpperCase()}</span><span>•</span><span>${group.length} doc(s)</span></div>
          <div class="card-actions">
            <div class="stats"><span>👁️ ${activePaper.views||0}</span>
              <button class="like-button ${isLiked?'liked':''}" onclick="event.stopPropagation(); window.toggleLike('${activePaper.id}', this)"><span>${isLiked?'❤️':'🤍'}</span> <span id="likes-${activePaper.id}">${activePaper.likes||0}</span></button>
            </div>
            <button class="btn-download" onclick="event.stopPropagation(); window.openBatchDownload('${course}', '${currentProgram}', '${currentSemester}')">📥 Save</button>
          </div>
        </div>
      `;
    }
    
    window.setActiveThumb = function(course, idx){
      activeThumbs[course]=idx;
      const group = allData.filter(d=>d.program===currentProgram && d.semester===currentSemester && d.course===course);
      const card = document.getElementById(`card-${course.replace(/\s/g,'')}`);
      if(card) updateCardElement(card, course, group, false);
    };
    
    window.openBatchDownload = function(course, program, semester) {
      const papers = allData.filter(d=>d.program===program && d.semester===semester && d.course===course);
      if(papers.length===0) return;
      const modal = document.getElementById('batchModal');
      const listContainer = document.getElementById('batchListContainer');
      listContainer.innerHTML = '';
      papers.forEach((paper) => {
        const item = document.createElement('div'); item.className='batch-item';
        const thumbUrl = getOptimizedImageUrl(paper.file_url, 80, 80);
        item.innerHTML = `
          <input type="checkbox" class="batch-checkbox" data-url="${paper.file_url}" data-name="${paper.file_name || paper.Mid || 'document'}" checked>
          <img src="${thumbUrl}" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 width=%2748%27 height=%2748%27%3E%3Crect width=%2748%27 height=%2748%27 fill=%27%23cbd5e1%27/%3E%3Ctext x=%2750%25%27 y=%2750%25%27 text-anchor=%27middle%27 dy=%27.3em%27%3E📄%3C/text%3E%3C/svg%3E'">
          <div class="batch-item-info"><div class="batch-item-title">${paper.Mid || 'Exam Paper'}</div><div class="batch-item-type">${paper.file_type?.toUpperCase()}</div></div>
        `;
        listContainer.appendChild(item);
      });
      const selectAllChk = document.getElementById('selectAllCheckbox');
      selectAllChk.checked = true;
      selectAllChk.onchange = (e) => { document.querySelectorAll('.batch-checkbox').forEach(cb => cb.checked = e.target.checked); };
      const downloadBtn = document.getElementById('downloadSelectedBtn');
      const newDownloadBtn = downloadBtn.cloneNode(true);
      downloadBtn.parentNode.replaceChild(newDownloadBtn, downloadBtn);
      newDownloadBtn.onclick = async () => {
        const selected = Array.from(document.querySelectorAll('.batch-checkbox:checked')).map(cb => ({ url: cb.dataset.url, name: cb.dataset.name }));
        if(selected.length===0){ showToast("No file selected", true); return; }
        showToast(`Downloading ${selected.length} file(s)...`);
        for(let item of selected){
          try{
            const response = await fetch(item.url);
            const blob = await response.blob();
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = item.name || 'pastpaper';
            link.click();
            URL.revokeObjectURL(link.href);
            await new Promise(r => setTimeout(r, 300));
          } catch(e){ window.open(item.url, '_blank'); }
        }
        showToast(`✅ ${selected.length} file(s) saved`);
        closeBatchModal();
      };
      modal.classList.add('active');
    };
    function closeBatchModal(){ document.getElementById('batchModal').classList.remove('active'); }
    window.closeBatchModal = closeBatchModal;
    
    window.toggleLike = async function(paperId, btn){
      const liked = likedPapers[paperId] || false;
      const newLike = !liked;
      const paper = allData.find(p=>p.id==paperId);
      if(!paper) return;
      const newCount = newLike ? (paper.likes||0)+1 : Math.max(0, (paper.likes||0)-1);
      btn.classList.toggle('liked', newLike);
      btn.querySelector('span:first-child').textContent = newLike ? '❤️' : '🤍';
      document.getElementById(`likes-${paperId}`).textContent = newCount;
      likedPapers[paperId] = newLike;
      localStorage.setItem('likedPapers', JSON.stringify(likedPapers));
      try{
        await client.from('past_papers').update({ likes: newCount }).eq('id', paperId);
        paper.likes = newCount;
      } catch(e){
        likedPapers[paperId] = liked;
        localStorage.setItem('likedPapers', JSON.stringify(likedPapers));
        btn.classList.toggle('liked', liked);
        btn.querySelector('span:first-child').textContent = liked ? '❤️' : '🤍';
        document.getElementById(`likes-${paperId}`).textContent = paper.likes||0;
        showToast("Failed to update like", true);
      }
    };
    
    function showToast(msg, isError=false, persist=false){
      toast.textContent = msg;
      toast.className = `toast active ${isError?'error':''}`;
      if(window.toastTimeout) clearTimeout(window.toastTimeout);
      if(!persist) window.toastTimeout = setTimeout(()=>toast.classList.remove('active'),3000);
    }
    
    // Event listeners
    backBtn.onclick = () => {
      if(currentView === 'papers') renderSemesters(currentProgram);
      else if(currentView === 'semesters') renderPrograms();
    };
    searchInput.addEventListener('input', (e)=>{
      searchQuery = e.target.value.toLowerCase();
      if(currentView==='programs') renderPrograms();
      else if(currentView==='semesters') renderSemesters(currentProgram);
      else if(currentView==='papers') renderPapers(currentProgram, currentSemester);
    });
    addPaperBtn.onclick = () => uploadModal.classList.add('active');
    uploadModal.onclick = (e) => { if(e.target === uploadModal) closeModal(); };
    document.getElementById('cancelModalBtn').onclick = closeModal;
    fileUploadZone.onclick = () => fileInput.click();
    fileUploadZone.addEventListener('dragover', e=>{ e.preventDefault(); fileUploadZone.classList.add('dragover'); });
    fileUploadZone.addEventListener('dragleave', ()=>fileUploadZone.classList.remove('dragover'));
    fileUploadZone.addEventListener('drop', e=>{ e.preventDefault(); fileUploadZone.classList.remove('dragover'); handleFiles(e.dataTransfer.files); });
    fileInput.addEventListener('change', e=>handleFiles(e.target.files));
    document.getElementById('uploadBtn').onclick = uploadPapers;
    document.getElementById('cameraBtn').onclick = takePhoto;
    document.getElementById('closeBatchModalBtn').onclick = closeBatchModal;
    
    // Prevent accidental form submission
    document.addEventListener('submit', (e) => { if(e.target.closest('#uploadModal')) e.preventDefault(); });
    
    // Initialize
    fetchProgramsDropdown();
    window.onload = loadData;
  })();
</script>
