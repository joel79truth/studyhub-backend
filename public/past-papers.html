<script>
  (function(){

    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFvc3VkYmlnb3h3emJkcWtkZWN6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTc3NDU3NDMsImV4cCI6MjA3MzMyMTc0M30.B4ITihJkyALUSahDgGNgta6tivR7siBy7wM8KKb6JVQ';

    // DOM elements

    const addPaperBtn = document.getElementById('addPaperBtn');
    const uploadModal = document.getElementById('uploadModal');
    const fileUploadZone = document.getElementById('fileUploadZone');

    const filePreviewContainer = document.getElementById('filePreviewContainer');
    const programSelect = document.getElementById('programSelect');
    
    let currentView = 'programs';
    let currentProgram = null, currentSemester = null;
    let allData = [];
    let searchQuery = '';
    let selectedFiles = [];
    let likedPapers = JSON.parse(localStorage.getItem('likedPapers') || '{}');
    const activeThumbs = {};
    
    // ========== FIXED: SIMPLE IMAGE PROCESSING ==========
    let isProcessing = false;
    let imageQueue = [];
    
    // Generate optimized thumbnail URL using Supabase transforms
    function getOptimizedUrl(url, width, height) {
      if (!url) return '';
      const separator = url.includes('?') ? '&' : '?';
      return `${url}${separator}width=${width}&height=${height}&quality=60`;
    }
    
    // Create image with proper sizing (never load full original)
    function createSizedImage(src, alt, width, height, className) {
      const img = new Image();
      img.src = getOptimizedUrl(src, width, height);
      img.alt = alt || '';
      img.loading = 'lazy';
      img.className = className || '';
      img.style.width = '100%';
      img.style.height = '100%';
      img.style.objectFit = 'cover';
      img.onerror = () => {
        img.src = 'data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 width=%27400%27 height=%27200%27%3E%3Crect width=%27400%27 height=%27200%27 fill=%27%23cbd5e1%27/%3E%3Ctext x=%2750%25%27 y=%2750%25%27 text-anchor=%27middle%27 dy=%27.3em%27%3E📄%3C/text%3E%3C/svg%3E';
      };
      return img;
    }
    
    // Process single image - resize to max 800px width, compress (NO VALIDATION REJECTION)
    async function compressImage(file) {
      return new Promise((resolve, reject) => {
        const url = URL.createObjectURL(file);
        const img = new Image();
        img.onload = () => {
          URL.revokeObjectURL(url);
          
          let width = img.width;
          let height = img.height;
          const maxDim = 800;
          
          // Only resize if actually needed
          if (width > maxDim || height > maxDim) {
            if (width > height) {
              height = (height * maxDim) / width;
              width = maxDim;
            } else {
              width = (width * maxDim) / height;
              height = maxDim;
            }
          }
          
          const canvas = document.createElement('canvas');
          canvas.width = Math.floor(width);
          canvas.height = Math.floor(height);
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
          
          canvas.toBlob(blob => {
            // Cleanup
            canvas.width = 0;
            canvas.height = 0;
            img.src = '';
            const processedFile = new File([blob], file.name.replace(/\.[^/.]+$/, '.jpg'), { type: 'image/jpeg' });
            resolve(processedFile);
          }, 'image/jpeg', 0.8);
        };
        img.onerror = () => {
          URL.revokeObjectURL(url);
          // Don't reject - just return original file as fallback
          resolve(file);
        };
        img.src = url;
      });
    }
    
    // Create thumbnail without complex validation
    async function createThumbnail(file) {
      return new Promise((resolve) => {
        const url = URL.createObjectURL(file);
        const img = new Image();
        img.onload = () => {
          const canvas = document.createElement('canvas');
          canvas.width = 80;
          canvas.height = 80;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, 80, 80);
          const thumbnail = canvas.toDataURL('image/jpeg', 0.6);
          URL.revokeObjectURL(url);
          canvas.width = 0;
          canvas.height = 0;
          img.src = '';
          resolve(thumbnail);
        };
        img.onerror = () => {
          URL.revokeObjectURL(url);
          resolve(null);
        };
        img.src = url;
      });
    }
    
    // Process queue one by one
    async function processNextImage() {
      if (isProcessing || imageQueue.length === 0) return;
      isProcessing = true;
      const fileData = imageQueue.shift();
      
      try {
        // Compress the image
        const compressed = await compressImage(fileData.file);
        fileData.file = compressed;
        fileData.size = compressed.size;
        fileData.name = compressed.name;
        
        // Create thumbnail
        const thumb = await createThumbnail(compressed);
        fileData.thumbnail = thumb;
        fileData.verified = 'verified';
      } catch (err) {
        console.error('Compression failed, using original', err);
        // Still mark as verified - don't reject images
        fileData.verified = 'verified';
        // Try to create thumbnail from original
        try {
          const thumb = await createThumbnail(fileData.file);
          fileData.thumbnail = thumb;
        } catch(e) {
          fileData.thumbnail = null;
        }
      }
      
      renderPreviews();
      isProcessing = false;
      processNextImage();
    }
    
    function handleFiles(files) {
      const MAX_FILES = 3;
      const MAX_SIZE_MB = 5; // Increased to 5MB
      const MAX_SIZE_BYTES = MAX_SIZE_MB * 1024 * 1024;
      
      const newFiles = Array.from(files).filter(f => {
        if (selectedFiles.length >= MAX_FILES) {
          showToast(`Maximum ${MAX_FILES} files allowed`, true);
          return false;
        }
        if (f.size > MAX_SIZE_BYTES) {
          showToast(`${f.name} exceeds ${MAX_SIZE_MB}MB. Please use smaller images.`, true);
          return false;
        }
        if (!f.type.startsWith('image/')) {
          showToast('Only images allowed (JPEG, PNG)', true);
          return false;
        }
        return true;
      });
      
      for (const file of newFiles) {
        const fileData = {
          file: file,
          name: file.name,
          size: file.size,
          type: file.type,
          thumbnail: null,
          verified: 'checking',
          id: Date.now() + Math.random()
        };
        selectedFiles.push(fileData);
        imageQueue.push(fileData);
      }
      
      renderPreviews();
      processNextImage();
    }
    
    function renderPreviews() {
      filePreviewContainer.innerHTML = '';
      
      if (selectedFiles.length === 0) {
        filePreviewContainer.innerHTML = '';
        return;
      }
      
      selectedFiles.forEach((f, idx) => {
        const div = document.createElement('div');
        div.className = 'file-preview';
        let thumbHtml = '';
        
        if (f.thumbnail) {
          thumbHtml = `<img src="${f.thumbnail}" class="file-preview-thumb">`;
        } else if (f.verified === 'checking') {
          thumbHtml = `<div class="file-preview-thumb" style="background:#cbd5e1; display:flex;align-items:center;justify-content:center;">⏳</div>`;
        } else {
          thumbHtml = `<div class="file-preview-thumb" style="background:#e0e7ff; display:flex;align-items:center;justify-content:center;">📷</div>`;
        }
        
        let statusClass = '', statusText = '';
        if (f.verified === 'checking') { 
          statusClass = 'status-checking'; 
          statusText = 'Processing...'; 
        } else if (f.verified === 'verified') { 
          statusClass = 'status-verified'; 
          statusText = '✓ Ready'; 
        } else { 
          statusClass = 'status-invalid'; 
          statusText = 'Error'; 
        }
        
        // Format file size
        const sizeMB = (f.size / (1024 * 1024)).toFixed(1);
        
        div.innerHTML = `
          ${thumbHtml}
          <div class="file-preview-name">${f.name.length > 20 ? f.name.slice(0, 18) + '..' : f.name}</div>
          <div class="status-badge ${statusClass}">${statusText}</div>
          <div style="font-size: 9px; color: #64748b; margin-top: 2px;">${sizeMB} MB</div>
          <button class="file-preview-remove" data-idx="${idx}">×</button>
        `;
        filePreviewContainer.appendChild(div);
      });
      
      // Attach remove handlers
      document.querySelectorAll('.file-preview-remove').forEach(btn => {
        btn.onclick = (e) => {
          const idx = parseInt(btn.dataset.idx);
          if (!isNaN(idx) && selectedFiles[idx]) {
            const removed = selectedFiles[idx];
            const queueIdx = imageQueue.findIndex(q => q.id === removed.id);
            if (queueIdx !== -1) imageQueue.splice(queueIdx, 1);
            selectedFiles.splice(idx, 1);
            renderPreviews();
          }
        };
      });
      
      const uploadBtn = document.getElementById('uploadBtn');
      const hasInvalid = selectedFiles.some(f => f.verified === 'invalid');
      const checking = selectedFiles.some(f => f.verified === 'checking');
      uploadBtn.disabled = hasInvalid || checking || selectedFiles.length === 0;
      
      if (hasInvalid) {
        uploadBtn.textContent = 'Remove invalid files';
      } else if (checking) {
        uploadBtn.textContent = 'Processing...';
      } else if (selectedFiles.length > 0) {
        uploadBtn.textContent = `Upload ${selectedFiles.length} file(s)`;
      } else {
        uploadBtn.textContent = 'Upload';
      }
    }
    
    async function uploadPapers() {
      const program = programSelect.value.trim();
      const course = document.getElementById('courseInput').value.trim();
      const mid = document.getElementById('midInput').value.trim();
      const semester = document.getElementById('semesterInput').value;
      
      if (!program || !course || !mid || !semester) {
        showToast("Please fill all fields", true);
        return;
      }
      
      if (selectedFiles.length === 0) {
        showToast("Please select files to upload", true);
        return;
      }
      
      if (selectedFiles.some(f => f.verified !== 'verified')) {
        showToast("Please wait for all files to finish processing", true);
        return;
      }
      
      const uploadBtn = document.getElementById('uploadBtn');
      uploadBtn.disabled = true;
      uploadBtn.textContent = `Uploading 0/${selectedFiles.length}...`;
      let success = 0;
      
      try {
        for (let i = 0; i < selectedFiles.length; i++) {
          const fd = selectedFiles[i];
          const ext = 'jpg';
          const safeName = fd.name.replace(/[^a-zA-Z0-9.]/g, '_').substring(0, 50);
          const fileName = `${Date.now()}_${i}_${safeName}`;
          const filePath = `${program}/${course}/${semester}/${fileName}`;
          
          const { error: upErr } = await client.storage.from('past-paper').upload(filePath, fd.file, {
            cacheControl: '3600',
            upsert: false
          });
          
          if (upErr) throw upErr;
          
          const file_url = client.storage.from('past-paper').getPublicUrl(filePath).data.publicUrl;
          
          const { error: insErr } = await client.from('past_papers').insert([{ 
            program, course, semester, Mid: mid, 
            file_name: fileName, file_url, file_type: ext, 
            views: 0, likes: 0 
          }]);
          
          if (insErr) throw insErr;
          
          success++;
          uploadBtn.textContent = `Uploading ${success}/${selectedFiles.length}...`;
        }
        
        showToast(`✅ ${success} file(s) uploaded successfully!`);
        closeModal();
        loadData();
        
      } catch(e) {
        console.error('Upload error:', e);
        showToast("Upload failed: " + e.message, true);
      } finally {
        uploadBtn.disabled = false;
        uploadBtn.textContent = 'Upload';
      }
    }
    
    async function takePhoto() {
      try {
        // Try back camera first
        let stream;
        try {
          stream = await navigator.mediaDevices.getUserMedia({ 
            video: { facingMode: { exact: "environment" } } 
          });
        } catch (e) {
          // Fallback to any camera
          stream = await navigator.mediaDevices.getUserMedia({ video: true });
        }
        
        const video = document.createElement('video');
        video.srcObject = stream;
        video.setAttribute('playsinline', '');
        await video.play();
        
        // Wait a bit for camera to adjust
        await new Promise(r => setTimeout(r, 500));
        
        const canvas = document.createElement('canvas');
        canvas.width = Math.min(video.videoWidth, 800);
        canvas.height = Math.min(video.videoHeight, 800);
        const ctx = canvas.getContext('2d');
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        
        canvas.toBlob(blob => {
          if (blob) {
            const file = new File([blob], `camera_${Date.now()}.jpg`, { type: 'image/jpeg' });
            handleFiles([file]);
          }
          stream.getTracks().forEach(track => track.stop());
          canvas.width = 0;
          canvas.height = 0;
        }, 'image/jpeg', 0.8);
        
      } catch (err) {
        console.error('Camera error:', err);
        showToast('Could not access camera. Please check permissions.', true);
      }
    }
    
    function closeModal() {
      // Cancel processing
      isProcessing = false;
      imageQueue = [];
      selectedFiles = [];
      uploadModal.classList.remove('active');
      document.getElementById('courseInput').value = '';
      document.getElementById('midInput').value = '';
      document.getElementById('semesterInput').value = '';
      programSelect.value = '';
      fileInput.value = '';
      renderPreviews();
    }
    
    // Rest of your existing functions (loadData, fetchProgramsDropdown, renderPrograms, etc.)
    // These remain exactly as they were in your original working code
    
    async function loadData(){
      try {
        const { data, error } = await client.from('past_papers').select('*').order('uploaded_at',{ascending:false});
        if(error) throw error;
        allData = data || [];
        renderPrograms();
      } catch(err){
        container.innerHTML = `<div style="grid-column:1/-1;text-align:center;color:red;">Error: ${err.message}</div>`;
      }
    }
    
    async function fetchProgramsDropdown() {
      try {
        const { data, error } = await client.from('programs').select('name').order('name');
        if (!error && data && data.length > 0) {
          programSelect.innerHTML = '<option value="">-- Select Program --</option>';
          data.forEach(prog => {
            const option = document.createElement('option');
            option.value = prog.name;
            option.textContent = prog.name;
            programSelect.appendChild(option);
          });
        } else {
          // Fallback: get programs from past_papers
          const { data: papers } = await client.from('past_papers').select('program');
          const unique = [...new Set(papers?.map(p => p.program).filter(Boolean))];
          programSelect.innerHTML = '<option value="">-- Select Program --</option>';
          unique.forEach(p => { 
            const opt = document.createElement('option'); 
            opt.value = p; 
            opt.textContent = p; 
            programSelect.appendChild(opt); 
          });
        }
      } catch(err) {
        console.error("Failed to load programs:", err);
        programSelect.innerHTML = '<option value="">Error loading programs</option>';
      }
    }
    
    function renderPrograms(){
      currentView='programs'; 
      breadcrumb.classList.remove('active'); 
      container.innerHTML='';
      let filtered = searchQuery ? allData.filter(d=>d.program?.toLowerCase().includes(searchQuery)) : allData;
      const progs = [...new Set(filtered.map(d=>d.program))];
      if(progs.length===0){ 
        container.innerHTML=`<div style="grid-column:1/-1;text-align:center;padding:40px;">No programs found</div>`; 
        return; 
      }
      progs.forEach(prog=>{
        const count = allData.filter(d=>d.program===prog).length;
        const el = document.createElement('div'); 
        el.className='grid-card';
        el.innerHTML = `<div class="grid-icon">🎓</div><div class="grid-info"><h3>${prog}</h3><p>${count} papers</p></div>`;
        el.onclick = () => renderSemesters(prog);
        container.appendChild(el);
      });
    }
    
    function renderSemesters(program){
      currentProgram=program; 
      currentView='semesters'; 
      breadcrumb.classList.add('active'); 
      breadcrumbText.textContent=program; 
      container.innerHTML='';
      const sems = [...new Set(allData.filter(d=>d.program===program).map(d=>d.semester))];
      sems.forEach(sem=>{
        const count = allData.filter(d=>d.program===program && d.semester===sem).length;
        const el = document.createElement('div'); 
        el.className='grid-card';
        el.innerHTML = `<div class="grid-icon">📅</div><div class="grid-info"><h3>${sem}</h3><p>${count} docs</p></div>`;
        el.onclick = () => renderPapers(program, sem);
        container.appendChild(el);
      });
    }
    
    function renderPapers(program, semester){
      currentSemester=semester; 
      currentView='papers'; 
      breadcrumbText.textContent=`${program} / ${semester}`; 
      container.innerHTML='';
      let papers = allData.filter(d=>d.program===program && d.semester===semester);
      if(searchQuery) papers = papers.filter(p=>p.course?.toLowerCase().includes(searchQuery) || p.Mid?.toLowerCase().includes(searchQuery));
      const groups = {};
      papers.forEach(p=>{ 
        if(!groups[p.course]) groups[p.course]=[]; 
        groups[p.course].push(p); 
      });
      const courses = Object.keys(groups);
      if(courses.length===0){ 
        container.innerHTML=`<div style="text-align:center;padding:40px;">No papers found</div>`; 
        return; 
      }
      courses.forEach((course)=>{
        const group = groups[course];
        if(!activeThumbs[course]) activeThumbs[course]=0;
        const card = document.createElement('div'); 
        card.className='card'; 
        card.id=`card-${course.replace(/\s/g,'')}`;
        const activeIdx = activeThumbs[course];
        const activePaper = group[activeIdx];
        const isLiked = likedPapers[activePaper.id] || false;
        const previewImg = createSizedImage(activePaper.file_url, course, 400, 200, 'card-img');
        let thumbsHtml = '';
        if(group.length>1){
          thumbsHtml = `<div class="thumbnails">`;
          group.forEach((p,idx)=>{
            const thumbImg = createSizedImage(p.file_url, p.Mid, 52, 52, '');
            thumbsHtml += `<div class="thumb ${idx===activeIdx?'active':''}" onclick="event.stopPropagation(); window.setActiveThumb('${course}', ${idx})">${thumbImg.outerHTML}<div class="thumb-label">${(p.Mid||'Exam').slice(0,8)}</div></div>`;
          });
          thumbsHtml += `</div>`;
        }
        card.innerHTML = `
          <div class="card-preview" onclick="window.open('${activePaper.file_url}','_blank')"><div class="card-badge">${activePaper.Mid||'Exam'}</div>${previewImg.outerHTML}</div>
          ${thumbsHtml}
          <div class="card-content">
            <h3 class="card-title">${course}</h3>
            <div class="card-meta"><span>${(activePaper.file_type||'file').toUpperCase()}</span><span>•</span><span>${group.length} doc(s)</span></div>
            <div class="card-actions">
              <div class="stats"><span>👁️ ${activePaper.views||0}</span>
                <button class="like-button ${isLiked?'liked':''}" onclick="event.stopPropagation(); window.toggleLike('${activePaper.id}', this)"><span>${isLiked?'❤️':'🤍'}</span> <span id="likes-${activePaper.id}">${activePaper.likes||0}</span></button>
              </div>
              <button class="btn-download" onclick="event.stopPropagation(); window.openBatchDownload('${course}', '${program}', '${semester}')">📥 Save</button>
            </div>
          </div>
        `;
        container.appendChild(card);
      });
    }
    
    window.setActiveThumb = function(course, idx){
      activeThumbs[course]=idx;
      renderPapers(currentProgram, currentSemester);
    };
    
    window.openBatchDownload = function(course, program, semester) {
      const papers = allData.filter(d=>d.program===program && d.semester===semester && d.course===course);
      if(papers.length===0) return;
      const modal = document.getElementById('batchModal');
      const listContainer = document.getElementById('batchListContainer');
      listContainer.innerHTML = '';
      papers.forEach((paper) => {
        const item = document.createElement('div'); 
        item.className='batch-item';
        item.innerHTML = `
          <input type="checkbox" class="batch-checkbox" data-url="${paper.file_url}" data-name="${paper.file_name || paper.Mid || 'document'}" checked>
          <img src="${getOptimizedUrl(paper.file_url, 80, 80)}" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 width=%2748%27 height=%2748%27%3E%3Crect width=%2748%27 height=%2748%27 fill=%27%23cbd5e1%27/%3E%3Ctext x=%2750%25%27 y=%2750%25%27 text-anchor=%27middle%27 dy=%27.3em%27%3E📄%3C/text%3E%3C/svg%3E'">
          <div class="batch-item-info"><div class="batch-item-title">${paper.Mid || 'Exam Paper'}</div><div class="batch-item-type">${paper.file_type?.toUpperCase()}</div></div>
        `;
        listContainer.appendChild(item);
      });
      const selectAllChk = document.getElementById('selectAllCheckbox');
      selectAllChk.checked = true;
      selectAllChk.onchange = (e) => { document.querySelectorAll('.batch-checkbox').forEach(cb => cb.checked = e.target.checked); };
      const downloadBtn = document.getElementById('downloadSelectedBtn');
      const newDownloadBtn = downloadBtn.cloneNode(true);
      downloadBtn.parentNode.replaceChild(newDownloadBtn, downloadBtn);
      newDownloadBtn.onclick = async () => {
        const selected = Array.from(document.querySelectorAll('.batch-checkbox:checked')).map(cb => ({ url: cb.dataset.url, name: cb.dataset.name }));
        if(selected.length===0){ showToast("No file selected", true); return; }
        showToast(`Downloading ${selected.length} file(s)...`);
        for(let item of selected){
          try{
            const response = await fetch(item.url);
            const blob = await response.blob();
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = item.name || 'pastpaper';
            link.click();
            URL.revokeObjectURL(link.href);
            await new Promise(r => setTimeout(r, 200));
          } catch(e){ 
            window.open(item.url, '_blank'); 
          }
        }
        showToast(`✅ ${selected.length} file(s) saved`);
        modal.classList.remove('active');
      };
      modal.classList.add('active');
    };
    
    window.toggleLike = async function(paperId, btn){
      const liked = likedPapers[paperId] || false;
      const newLike = !liked;
      const paper = allData.find(p=>p.id==paperId);
      if(!paper) return;
      const newCount = newLike ? (paper.likes||0)+1 : Math.max(0, (paper.likes||0)-1);
      btn.classList.toggle('liked', newLike);
      btn.querySelector('span:first-child').textContent = newLike ? '❤️' : '🤍';
      document.getElementById(`likes-${paperId}`).textContent = newCount;
      likedPapers[paperId] = newLike;
      localStorage.setItem('likedPapers', JSON.stringify(likedPapers));
      try{
        await client.from('past_papers').update({ likes: newCount }).eq('id', paperId);
        paper.likes = newCount;
      } catch(e){
        likedPapers[paperId] = liked;
        localStorage.setItem('likedPapers', JSON.stringify(likedPapers));
        btn.classList.toggle('liked', liked);
        btn.querySelector('span:first-child').textContent = liked ? '❤️' : '🤍';
        document.getElementById(`likes-${paperId}`).textContent = paper.likes||0;
        showToast("Failed to update like", true);
      }
    };
    
    function showToast(msg, isError=false){
      toast.textContent = msg;
      toast.className = `toast active ${isError?'error':''}`;
      if(window.toastTimeout) clearTimeout(window.toastTimeout);
      window.toastTimeout = setTimeout(()=>toast.classList.remove('active'),3000);
    }
    
    // Event binding
    backBtn.onclick = () => { 
      if(currentView === 'papers') renderSemesters(currentProgram);
      else if(currentView === 'semesters') renderPrograms();
    };
    
    searchInput.addEventListener('input', (e)=>{
      searchQuery = e.target.value.toLowerCase();
      if(currentView==='programs') renderPrograms();
      else if(currentView==='semesters') renderSemesters(currentProgram);
      else if(currentView==='papers') renderPapers(currentProgram, currentSemester);
    });
    
    addPaperBtn.onclick = () => uploadModal.classList.add('active');
    uploadModal.onclick = (e) => { if(e.target === uploadModal) closeModal(); };
    document.getElementById('cancelModalBtn').onclick = closeModal;
    fileUploadZone.onclick = () => fileInput.click();
    fileUploadZone.addEventListener('dragover', e=>{ e.preventDefault(); fileUploadZone.classList.add('dragover'); });
    fileUploadZone.addEventListener('dragleave', ()=>fileUploadZone.classList.remove('dragover'));
    fileUploadZone.addEventListener('drop', e=>{ e.preventDefault(); fileUploadZone.classList.remove('dragover'); handleFiles(e.dataTransfer.files); });
    fileInput.addEventListener('change', e=>handleFiles(e.target.files));
    document.getElementById('uploadBtn').onclick = uploadPapers;
    document.getElementById('cameraBtn').onclick = takePhoto;
    document.getElementById('closeBatchModalBtn').onclick = () => document.getElementById('batchModal').classList.remove('active');
    
    // Prevent accidental form submission
    document.addEventListener('submit', (e) => { if(e.target.closest('#uploadModal')) e.preventDefault(); });
    
    // Initialize
    fetchProgramsDropdown();
    window.onload = loadData;
  })();
</script>
