<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Program Details – StudyHub LUANAR</title>
<style>
body {
  font-family:'Segoe UI',sans-serif;
  margin:0; padding:0;
  background:url('https://images.pexels.com/photos/6216870/pexels-photo-6216870.jpeg?auto=compress&cs=tinysrgb&dpr=3&h=750&w=1260') no-repeat center center fixed;
  background-size:cover;
}
header {
  text-align:center;
  padding:20px;
  background: rgba(15,172,23,0.85);
  color:white;
  box-shadow:0 4px 8px rgba(0,0,0,0.2);
  font-size:1.8rem;
}
.container {
  max-width:900px;
  margin:20px auto;
  padding:0 20px;
}
.search-bar {
  width:100%;
  margin:20px 0;
}
.search-bar input {
  width:100%;
  padding:10px 15px;
  border-radius:50px;
  border:none;
  outline:none;
  font-size:14px;
  background: rgba(255,255,255,0.9);
  color:#1e1e1e;
  box-shadow:0 6px 15px rgba(0,0,0,0.2);
}
#fileList {
  margin-top:20px;
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
  gap:20px;
}
.file-card {
  background:white;
  border-radius:15px;
  padding:20px;
  box-shadow:0 8px 25px rgba(0,0,0,0.15);
  text-align:center;
  transition: transform 0.3s ease, box-shadow 0.3s ease;
}
.file-card:hover {
  transform: translateY(-5px);
  box-shadow:0 12px 30px rgba(0,0,0,0.2);
}
.file-card h3 {
  margin:0 0 10px 0;
  font-size:1.1rem;
  color:#1e1e1e;
}
.file-card p {
  font-size:0.9rem;
  color:#555;
  margin:5px 0;
}
.file-card button {
  margin:5px;
  padding:8px 14px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:600;
  transition: transform 0.2s ease;
}
.view-btn { background:#3498db; color:white; }
.download-btn { background:#2ecc71; color:white; }
.file-card button:hover { transform:scale(1.05); }
.back-home-btn {
  position:fixed;
  top:20px; left:20px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  width:55px; height:55px;
  background:#000;
  color:white;
  text-decoration:none;
  border-radius:50%;
  font-size:24px;
  box-shadow:0 6px 15px rgba(0,0,0,0.3);
}

/* Modal styles */
#fileModal {
  display:none;
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background: rgba(0,0,0,0.75);
  justify-content:center;
  align-items:center;
  z-index:9999;
  opacity:0;
  transition: opacity 0.3s ease;
}
#fileModal.show {
  display:flex;
  opacity:1;
}
#fileModalContent {
  position:relative;
  width:90%; max-width:900px;
  height:80%;
  background:white;
  border-radius:12px;
  overflow:hidden;
  display:flex;
  flex-direction:column;
  transform: scale(0.7);
  animation: zoomIn 0.4s forwards;
}
@keyframes zoomIn {
  to { transform: scale(1); }
}
#fileModal iframe {
  width:100%;
  height:100%;
  border:none;
}
.close-modal-btn {
  position:absolute;
  top:10px; right:10px;
  background:red;
  color:white;
  border:none;
  border-radius:6px;
  padding:5px 10px;
  cursor:pointer;
  z-index:10;
}
</style>
</head>
<body>

<header id="programTitle">Program Details</header>
<a href="program.html" class="back-home-btn" aria-label="Back to Programs">🏠</a>

<div class="container">

  <div class="filter-container">
    <button class="filter-btn active" onclick="filterBySemester('all', this)">All</button>
    <button class="filter-btn" onclick="filterBySemester('1', this)">Sem 1</button>
    <button class="filter-btn" onclick="filterBySemester('2', this)">Sem 2</button>
    <button class="filter-btn" onclick="filterBySemester('3', this)">Sem 3</button>
    <button class="filter-btn" onclick="filterBySemester('4', this)">Sem 4</button>
    <button class="filter-btn" onclick="filterBySemester('5', this)">Sem 5</button>
    <button class="filter-btn" onclick="filterBySemester('6', this)">Sem 6</button>
    <button class="filter-btn" onclick="filterBySemester('7', this)">Sem 7</button>
  </div>

  <div class="search-bar">
    <input type="text" id="fileSearch" placeholder="Search files by subject or name..." autocomplete="off">
  </div>

  <div id="fileList"></div>
</div>

<!-- Modal for viewing files -->
<div id="fileModal">
  <div id="fileModalContent">
    <button class="close-modal-btn" onclick="closeModal()">✖ Close</button>
    <iframe id="fileViewer"></iframe>
  </div>
</div>

<script>
// Get program name from URL
const params = new URLSearchParams(window.location.search);
const programName = (params.get("program") || "").trim();
document.getElementById("programTitle").textContent = programName || "Program Details";

let allFiles = [];
let currentSemester = 'all';

function equalsIgnoreCase(a,b) { return a?.toLowerCase() === b?.toLowerCase(); }

async function loadFiles() {
  try {
    const res = await fetch("/api/metadata");
    const metadata = await res.json();

    const files = Array.isArray(metadata.files) ? metadata.files : [];
    let validFiles = [];
    for (const f of files) {
      if (equalsIgnoreCase(f.program, programName) && f.url) {
        validFiles.push(f);
      }
    }

    allFiles = validFiles;
    displayFiles(allFiles);

  } catch (err) {
    console.error(err);
    document.getElementById("fileList").innerHTML = '<div class="empty-state">❌ Error loading files.</div>';
  }
}

function displayFiles(files) {
  const container = document.getElementById("fileList");
  if(!files.length) {
    container.innerHTML = "<p>No uploaded files exist for this program.</p>";
    return;
  }

  container.innerHTML = files.map(f => `
    <div class="file-card">
      <h3>${f.name}</h3>
      <p><strong>Semester:</strong> ${f.semester}</p>
      <p><strong>Subject:</strong> ${f.subject}</p>
      <button class="view-btn" onclick="openModal('${f.url}')">View</button>
      <button class="download-btn" onclick="downloadFile('${f.url}')">Download</button>
    </div>
  `).join('');
}

// Apply all filters (semester + search)
function applyFilters() {
  const searchQuery = document.getElementById("fileSearch").value.trim().toLowerCase();
  
  const filtered = allFiles.filter(f => {
    // Check Semester Match
    const semMatch = currentSemester === 'all' || 
                     f.semester.toString().toLowerCase().includes(currentSemester.toLowerCase());
    
    // Check Search Match
    const searchMatch = f.filename.toLowerCase().includes(searchQuery) || 
                        f.subject.toLowerCase().includes(searchQuery);
    
    return semMatch && searchMatch;
  });
  
  displayFiles(filtered);
}

// Get file preview HTML
function getFilePreview(filename, filePath) {
  const ext = filename.split('.').pop().toLowerCase();
  const imageExtensions = ['jpg', 'jpeg', 'png', 'gif', 'webp', 'svg'];
  
  // If it's an image file, show the actual image
  if (imageExtensions.includes(ext)) {
    return `<img src="${filePath}" alt="${filename}" onerror="this.parentElement.innerHTML=renderPlaceholder('${filename}')">`;
  } 
  
  // Otherwise, show a stylized placeholder with the icon
  return renderPlaceholder(filename);
}

// Render placeholder for non-image files
function renderPlaceholder(filename) {
  const icon = getFileIcon(filename);
  return `
    <div class="file-placeholder">
      <div class="file-icon">${icon}</div>
    </div>
  `;
}

// Display files
function displayFiles(files) {
  const container = document.getElementById("fileList");
  
  if (!files.length) {
    container.innerHTML = '<div class="empty-state">📚 No files available for this selection.</div>';
    return;
  }

  container.innerHTML = files.map(f => {
    const filePath = f.url.startsWith("http") ? f.url : (f.url.startsWith("/") ? f.url.slice(1) : f.url);
    
    return `
      <div class="file-card">
        <div class="file-card-preview">
          ${getFilePreview(f.filename, filePath)}
        </div>
        <div class="file-card-header">
          <h3>${f.filename}</h3>
        </div>
        <div class="file-card-body">
          <div class="file-info-grid">
            <div class="file-info-item">
              <div class="file-info-label">Semester</div>
              <div class="file-info-value">${f.semester}</div>
            </div>
            <div class="file-info-item subject">
              <div class="file-info-label">Course</div>
              <div class="file-info-value">${f.subject}</div>
            </div>
          </div>
          <div class="button-group">
            <button class="view-btn" onclick="viewFile('${filePath}')">👁️ View</button>
            <button class="download-btn" onclick="downloadFile('${filePath}', '${f.filename}')">⬇️ Download</button>
          </div>
        </div>
      </div>
    `;
  }).join('');
}

// Open file in new tab
function viewFile(filePath) {
  window.open(filePath, "_blank");
}

// Download file with the correct filename
function downloadFile(url, filename) {
  const link = document.createElement("a");
  link.href = url;
  link.download = filename;          // Use the clean filename from metadata
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
  
  showToast("Download started!");
}

// Modal functions
function openModal(url) {
  const modal = document.getElementById('fileModal');
  const viewer = document.getElementById('fileViewer');

  if(url.endsWith('.pdf')) {
    viewer.src = url;
  } else if(url.endsWith('.pptx')) {
    viewer.src = `https://view.officeapps.live.com/op/embed.aspx?src=${encodeURIComponent(location.origin + url)}`;
  } else {
    viewer.src = url;
  }

  modal.classList.add('show');
}

function closeModal() {
  const modal = document.getElementById('fileModal');
  const viewer = document.getElementById('fileViewer');
  viewer.src = '';
  modal.classList.remove('show');
}

document.getElementById("fileSearch").addEventListener("input", function() {
  const query = this.value.toLowerCase();
  const filtered = allFiles.filter(f => f.name.toLowerCase().includes(query) || f.subject.toLowerCase().includes(query));
  displayFiles(filtered);
});

// Show toast notification
function showToast(message) {
  const toast = document.getElementById("toast");
  toast.textContent = message;
  toast.style.display = "block";
  setTimeout(() => toast.style.display = "none", 3000);
}

// Search files
document.getElementById("fileSearch").addEventListener("input", applyFilters);

// Request browser notification permission
if ("Notification" in window && Notification.permission !== "granted") {
  Notification.requestPermission();
}

function showBrowserNotification(program, semester, filename) {
  if (Notification.permission === "granted") {
    new Notification("New file uploaded!", {
      body: `${program} – ${semester} – ${filename}`,
      icon: "/icon.png"
    });
  }
}

// Initialize
loadFiles();
</script>

</body>
</html>
