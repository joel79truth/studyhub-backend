<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Program Details – StudyHub LUANAR</title>
<style>
body {
    font-family:'Segoe UI',sans-serif;
    margin:0;
    padding:0;
    background:url('https://images.pexels.com/photos/6216870/pexels-photo-6216870.jpeg?auto=compress&cs=tinysrgb&dpr=3&h=750&w=1260') no-repeat center center fixed;
    background-size:cover;
}
header {
    text-align:center;
    padding:20px;
    background: rgba(15,172,23,0.8);
    color:white;
    box-shadow:0 4px 8px rgba(0,0,0,0.2);
}
h1 { margin:0; font-size:2rem; }
.container { max-width:900px; margin:20px auto; padding:0 20px; }
.search-bar { width:300px; margin:20px auto; }
.search-bar input {
    width:100%;
    padding:10px 15px;
    border-radius:50px;
    border:none;
    outline:none;
    font-size:14px;
    background: rgba(255,255,255,0.9);
    color:#1e1e1e;
    box-shadow:0 6px 15px rgba(0,0,0,0.2);
}
#fileList { margin-top:20px; display:grid; grid-template-columns:repeat(auto-fill,minmax(250px,1fr)); gap:20px; }
.file-card { background:white; border-radius:15px; padding:20px; box-shadow:0 8px 25px rgba(0,0,0,0.15); text-align:center; }
.file-card h3 { margin:0 0 10px 0; font-size:1.1rem; color:#1e1e1e; }
.file-card p { font-size:0.9rem; color:#555; margin:5px 0; }
.file-card button { margin:5px; padding:8px 14px; border:none; border-radius:8px; cursor:pointer; font-weight:600; transition: transform 0.2s ease; }
.view-btn { background:#3498db; color:white; }
.download-btn { background:#2ecc71; color:white; }
.file-card button:hover { transform:scale(1.05); }
.back-home-btn { position:fixed; top:20px; left:20px; display:flex; flex-direction:column; align-items:center; justify-content:center; width:55px; height:55px; background:#000; color:white; text-decoration:none; border-radius:50%; font-size:24px; box-shadow:0 6px 15px rgba(0,0,0,0.3); }

/* Modal styles */
#viewerModal {
    position:fixed;
    top:0; left:0; right:0; bottom:0;
    background: rgba(0,0,0,0.8);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:9999;
}
#viewerModal iframe {
    width:90%;
    max-width:800px;
    height:80%;
    border:none;
    border-radius:12px;
    background:white;
}
#viewerModal .close-btn {
    position:absolute;
    top:20px;
    right:20px;
    font-size:30px;
    color:white;
    cursor:pointer;
}
</style>
</head>
<body>

<header><h1 id="programTitle">Program Details</h1></header>
<a href="program.html" class="back-home-btn" aria-label="Back to Programs">🏠</a>

<div class="container">

  <div class="filter-container">
    <button class="filter-btn active" onclick="filterBySemester('all', this)">All</button>
    <button class="filter-btn" onclick="filterBySemester('1', this)">Sem 1</button>
    <button class="filter-btn" onclick="filterBySemester('2', this)">Sem 2</button>
    <button class="filter-btn" onclick="filterBySemester('3', this)">Sem 3</button>
    <button class="filter-btn" onclick="filterBySemester('4', this)">Sem 4</button>
    <button class="filter-btn" onclick="filterBySemester('5', this)">Sem 5</button>
    <button class="filter-btn" onclick="filterBySemester('6', this)">Sem 6</button>
    <button class="filter-btn" onclick="filterBySemester('7', this)">Sem 7</button>
  </div>

  <div class="search-bar">
    <input type="text" id="fileSearch" placeholder="Search files by subject or name..." autocomplete="off">
  </div>

  <div id="fileList"></div>
</div>

<!-- Modal for viewing -->
<div id="viewerModal">
    <span class="close-btn" onclick="closeViewer()">×</span>
    <iframe id="viewerFrame"></iframe>
</div>

<script>
// Get program name from URL
const params = new URLSearchParams(window.location.search);
const programName = (params.get("program") || "").trim();
document.getElementById("programTitle").textContent = programName || "Program Details";

let allFiles = [];
let currentSemester = 'all';

async function loadFiles() {
  try {
    const res = await fetch("/api/metadata");
    const metadata = await res.json();
    const files = Array.isArray(metadata.files) ? metadata.files : [];
    allFiles = files.filter(f => f.program?.toLowerCase() === (programName||"").toLowerCase());
    displayFiles(allFiles);
  } catch (err) {
    console.error(err);
    document.getElementById("fileList").innerHTML = '<div class="empty-state">❌ Error loading files.</div>';
  }
}

function displayFiles(files) {
  const container = document.getElementById("fileList");
  container.innerHTML = files.map(f => `
    <div class="file-card">
      <h3>${f.name}</h3>
      <p><strong>Semester:</strong> ${f.semester}</p>
      <p><strong>Subject:</strong> ${f.subject}</p>
      <button class="view-btn" onclick="viewFile('${f.url}')">View</button>
      <button class="download-btn" onclick="downloadFile('${f.url}')">Download</button>
    </div>
  `).join('');
}

// Open file in modal
function viewFile(url) {
    const ext = url.split('.').pop().toLowerCase();
    const iframe = document.getElementById('viewerFrame');

    if (ext === "pdf") {
        iframe.src = url;
    } else if (ext === "pptx") {
        iframe.src = `https://view.officeapps.live.com/op/embed.aspx?src=${encodeURIComponent(location.origin + url)}`;
    } else {
        alert("Cannot preview this file type.");
        return;
    }

    document.getElementById('viewerModal').style.display = "flex";
}

function closeViewer() {
    document.getElementById('viewerModal').style.display = "none";
    document.getElementById('viewerFrame').src = "";
}

function downloadFile(url) {
    const link = document.createElement("a");
    link.href = url;
    link.download = url.split("/").pop();
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
}

// Search
document.getElementById("fileSearch").addEventListener("input", function() {
    const query = this.value.toLowerCase();
    const filtered = allFiles.filter(f => f.name.toLowerCase().includes(query) || f.subject.toLowerCase().includes(query));
    displayFiles(filtered);
});

// Show toast notification
function showToast(message) {
  const toast = document.getElementById("toast");
  toast.textContent = message;
  toast.style.display = "block";
  setTimeout(() => toast.style.display = "none", 3000);
}

// Search files
document.getElementById("fileSearch").addEventListener("input", applyFilters);

// Request browser notification permission
if ("Notification" in window && Notification.permission !== "granted") {
  Notification.requestPermission();
}

function showBrowserNotification(program, semester, filename) {
  if (Notification.permission === "granted") {
    new Notification("New file uploaded!", {
      body: `${program} – ${semester} – ${filename}`,
      icon: "/icon.png"
    });
  }
}

// Initialize
loadFiles();
</script>

</body>
</html>
