   
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Program Details – StudyHub LUANAR</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    background: linear-gradient(rgba(15, 23, 42, 0), rgba(30, 41, 59, 0)),
                url('https://images.pexels.com/photos/6216870/pexels-photo-6216870.jpeg?auto=compress&cs=tinysrgb&dpr=3&h=750&w=1260') no-repeat center center fixed;
    background-size: cover;
    color: #ffffff;
    min-height: 100vh;
    padding-bottom: 40px;
  }

  /* Header */
  header {
    text-align: center;
    padding: 30px 20px;
    background: rgba(37, 180, 32, 0.95);
    backdrop-filter: blur(10px);
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
    border-bottom: 2px solid rgba(59, 130, 246, 0.3);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  h1 { 
    margin: 0; 
    font-size: 1.8rem;
    background: linear-gradient(90deg, #ffffff, #fbfbfc, #f3f5f7);
    background-size: 200% auto;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    font-weight: 700;
    letter-spacing: 0.5px;
  }

  .program-subtitle {
    margin-top: 10px;
    font-size: 0.9rem;
    color: #e0e0e0;
    font-weight: 400;
  }

  /* Container */
  .container { 
    max-width: 1200px; 
    margin: 30px auto; 
    padding: 0 20px; 
  }

  /* Info Banner */
  .info-banner {
    text-align: center;
    margin: 20px auto 30px;
    max-width: 700px;
    background: rgba(59, 130, 246, 0.15);
    backdrop-filter: blur(10px);
    padding: 15px 20px;
    border-radius: 15px;
    border: 1px solid rgba(59, 130, 246, 0.3);
    font-size: 0.9rem;
    color: #ffffff;
    font-weight: 500;
    line-height: 1.6;
  }

  .notes-count {
    display: inline-block;
    background: linear-gradient(135deg, #4f46e5, #3b82f6);
    color: white;
    padding: 8px 16px;
    border-radius: 20px;
    font-weight: 600;
    font-size: 0.9rem;
    margin-bottom: 20px;
  }

  /* Search Bar */
  .search-bar { 
    max-width: 500px; 
    margin: 0 auto 30px; 
    position: relative; 
  }

  .search-bar input {
    width: 100%;
    padding: 15px 20px 15px 50px;
    border-radius: 50px;
    border: 2px solid rgba(59, 130, 246, 0.3);
    outline: none;
    font-size: 15px;
    background: rgba(30, 41, 59, 0.8);
    backdrop-filter: blur(10px);
    color: #fff;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
    transition: border-color 0.3s, box-shadow 0.3s;
  }

  .search-bar input:focus {
    border-color: rgba(59, 130, 246, 0.6);
    box-shadow: 0 4px 20px rgba(59, 130, 246, 0.3);
  }

  .search-bar input::placeholder {
    color: #94a3b8;
  }

  .search-bar::before {
    content: '🔍';
    position: absolute;
    left: 20px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 18px;
    pointer-events: none;
  }

  /* Notes Grid */
  #notesList {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 20px;
    padding: 0;
  }

  /* Note Card */
  .note-card {
    background: rgba(30, 41, 59, 0.95);
    backdrop-filter: blur(10px);
    border-radius: 20px;
    padding: 25px;
    box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
    border: 1px solid rgba(59, 130, 246, 0.2);
    position: relative;
    overflow: hidden;
    transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
  }

  .note-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 4px;
    background: linear-gradient(90deg, #3b82f6, #60a5fa);
    opacity: 0;
    transition: opacity 0.2s;
  }

  .note-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 12px 35px rgba(59, 130, 246, 0.3);
    border-color: rgba(59, 130, 246, 0.5);
  }

  .note-card:hover::before {
    opacity: 1;
  }

  /* File Icon */
  .file-icon {
    width: 60px;
    height: 60px;
    margin: 0 auto 15px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #4f46e5, #3b82f6);
    border-radius: 15px;
    font-size: 30px;
    box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
  }

  /* File Info */
  .file-name {
    font-size: 1.05rem;
    font-weight: 600;
    color: #fff;
    margin-bottom: 12px;
    word-wrap: break-word;
    line-height: 1.4;
    text-align: center;
  }

  .file-meta {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 18px;
    font-size: 0.85rem;
    color: #94a3b8;
  }

  .file-meta-item {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .file-meta-item span {
    display: inline-flex;
    align-items: center;
    gap: 5px;
  }

  .badge {
    display: inline-block;
    padding: 4px 10px;
    border-radius: 12px;
    font-size: 0.75rem;
    font-weight: 600;
    background: rgba(59, 130, 246, 0.2);
    color: #60a5fa;
    border: 1px solid rgba(59, 130, 246, 0.3);
    text-align: center;
    margin-bottom: 10px;
  }

  /* Action Buttons - SMALL AND ROUNDED */
  .card-actions {
    display: flex;
    gap: 10px;
    margin-top: 15px;
  }

  .btn {
    flex: 1;
    padding: 8px 14px;
    border: none;
    border-radius: 50px;
    font-size: 0.75rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    text-decoration: none;
    color: white;
  }

  .btn-view {
    background: linear-gradient(135deg, #10b981, #34d399);
    box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
  }

  .btn-view:hover {
    background: linear-gradient(135deg, #059669, #10b981);
    box-shadow: 0 6px 16px rgba(16, 185, 129, 0.4);
    transform: translateY(-2px);
  }

  .btn-download {
    background: linear-gradient(135deg, #4f46e5, #3b82f6);
    box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
  }

  .btn-download:hover {
    background: linear-gradient(135deg, #4338ca, #2563eb);
    box-shadow: 0 6px 16px rgba(59, 130, 246, 0.4);
    transform: translateY(-2px);
  }

  .btn:active {
    transform: translateY(0);
  }

  /* Back Button */
  .back-btn {
    position: fixed;
    top: 20px;
    left: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 50px;
    height: 50px;
    background: linear-gradient(135deg, #050505, #151616);
    color: white;
    text-decoration: none;
    border-radius: 50%;
    font-size: 22px;
    box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
    z-index: 1000;
    transition: transform 0.2s, box-shadow 0.2s;
  }

  .back-btn:hover {
    transform: scale(1.1);
    box-shadow: 0 6px 20px rgba(59, 130, 246, 0.6);
  }

  /* Profile Button */
  #youButton {
    position: fixed;
    top: 20px;
    right: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    z-index: 1000;
  }

  #youButton .profile-picture {
    width: 50px;
    height: 50px;
    border-radius: 50%;
    object-fit: cover;
    border: 3px solid #3b82f6;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
    transition: transform 0.2s;
    cursor: pointer;
  }

  #youButton .profile-picture:hover {
    transform: scale(1.1);
  }

  #youButton .btn-label {
    margin-top: 5px;
    font-size: 12px;
    font-weight: 600;
    color: #60a5fa;
    text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
  }

  /* Empty State */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: #94a3b8;
    font-size: 1.1rem;
  }

  .empty-state-icon {
    font-size: 4rem;
    margin-bottom: 20px;
    opacity: 0.5;
  }

  /* Loading State */
  .loading {
    text-align: center;
    padding: 60px 20px;
    color: #60a5fa;
    font-size: 1.1rem;
  }

  .spinner {
    display: inline-block;
    width: 40px;
    height: 40px;
    border: 4px solid rgba(59, 130, 246, 0.2);
    border-top-color: #3b82f6;
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin-bottom: 20px;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  /* Filter/Sort Bar */
  .filter-bar {
    display: flex;
    gap: 15px;
    margin-bottom: 25px;
    flex-wrap: wrap;
    align-items: center;
    justify-content: center;
  }

  .filter-bar select {
    padding: 10px 15px;
    border-radius: 25px;
    border: 2px solid rgba(59, 130, 246, 0.3);
    background: rgba(30, 41, 59, 0.8);
    color: #fff;
    font-size: 0.9rem;
    outline: none;
    cursor: pointer;
    transition: border-color 0.3s;
  }

  .filter-bar select:focus {
    border-color: rgba(59, 130, 246, 0.6);
  }

  .filter-bar select option {
    background: #1e293b;
    color: #fff;
  }

  /* Mobile Responsiveness */
  @media (max-width: 768px) {
    header {
      padding: 20px 15px;
    }

    h1 {
      font-size: 1.4rem;
    }

    .program-subtitle {
      font-size: 0.85rem;
    }

    .container {
      padding: 0 15px;
      margin: 20px auto;
    }

    .info-banner {
      font-size: 0.85rem;
      padding: 12px 15px;
      margin: 15px auto 25px;
    }

    .search-bar {
      margin-bottom: 25px;
    }

    .search-bar input {
      padding: 13px 15px 13px 45px;
      font-size: 14px;
    }

    .search-bar::before {
      left: 15px;
      font-size: 16px;
    }

    #notesList {
      grid-template-columns: 1fr;
      gap: 15px;
    }

    .note-card {
      padding: 20px;
    }

    .file-icon {
      width: 50px;
      height: 50px;
      font-size: 25px;
    }

    .file-name {
      font-size: 1rem;
    }

    .filter-bar {
      flex-direction: column;
      align-items: stretch;
    }

    .filter-bar select {
      width: 100%;
    }
  }

  @media (max-width: 480px) {
    h1 {
      font-size: 1.2rem;
    }

    .program-subtitle {
      font-size: 0.8rem;
    }

    .info-banner {
      font-size: 0.8rem;
      padding: 10px 12px;
    }

    .note-card {
      padding: 18px;
    }

    .back-btn {
      width: 40px;
      height: 40px;
      font-size: 18px;
      top: 12px;
      left: 12px;
    }

    #youButton {
      top: 12px;
      right: 12px;
    }

    #youButton .profile-picture {
      width: 40px;
      height: 40px;
      border-width: 2px;
    }

    #youButton .btn-label {
      font-size: 10px;
    }
  }

  /* Performance optimizations for mobile */
  @media (max-width: 768px) {
    * {
      animation: none !important;
    }

    .note-card,
    .btn,
    .back-btn,
    #youButton .profile-picture {
      transition: transform 0.15s ease !important;
    }

    header, 
    .note-card, 
    .search-bar, 
    .info-banner {
      backdrop-filter: none !important;
      box-shadow: none !important;
      border: none !important;
    }

    .note-card:hover {
      transform: none;
      box-shadow: none;
      border-color: initial;
    }

    .note-card::before {
      opacity: 0 !important;
    }

    #youButton .btn-label {
      text-shadow: none;
    }

    body {
      background: url('https://images.pexels.com/photos/6216870/pexels-photo-6216870.jpeg?auto=compress&cs=tinysrgb&dpr=2&h=400&w=600') no-repeat center center fixed;
      background-size: cover;
    }
  }
</style>

<body>

<a href="program.html" class="back-btn" aria-label="Back to Programs">←</a>

<header>
  <h1 id="programTitle">Program Details</h1>
  <div class="program-subtitle" id="programSubtitle"></div>
</header>

<div class="profile-container" id="youButton">
  <a href="profile.html">
    <img id="youProfilePic" 
         src="https://cdn-icons-png.flaticon.com/512/847/847969.png" 
         alt="Profile Picture" 
         class="profile-picture">
  </a>
  <div class="btn-label">You</div>
</div>

<div class="container">
  <div class="info-banner">
    📚 Browse and download notes for this program
  </div>

  <div style="text-align: center;">
    <span class="notes-count" id="notesCount">Loading...</span>
  </div>

  <div class="search-bar">
    <input type="text" id="notesSearch" placeholder="Search by course name..." autocomplete="off">
  </div>

  <div class="filter-bar">
    <select id="sortBy">
      <option value="newest">Newest First</option>
      <option value="oldest">Oldest First</option>
      <option value="name">Name (A-Z)</option>
      <option value="name-desc">Name (Z-A)</option>
    </select>
    <select id="filterByCourse">
      <option value="all">All Courses</option>
    </select>
  </div>

  <div id="notesList"></div>
</div>

<script>
// Get program name from URL
const urlParams = new URLSearchParams(window.location.search);
const programName = urlParams.get('program');

let allNotes = [];
let filteredNotes = [];
let availableCourses = [];

// Normalize text for search (case-insensitive)
function normalizeText(text) {
  return text.trim().toLowerCase();
}

// Get file extension
function getFileExtension(filename) {
  if (!filename) return 'unknown';
  const ext = filename.split('.').pop().toLowerCase();
  return ext || 'unknown';
}

// Get file icon based on extension
function getFileIcon(filename) {
  const ext = getFileExtension(filename);
  const icons = {
    pdf: '📕',
    doc: '📘',
    docx: '📘',
    ppt: '📙',
    pptx: '📙',
    txt: '📄',
    rtf: '📄',
    jpg: '🖼️',
    jpeg: '🖼️',
    png: '🖼️',
    gif: '🖼️',
    zip: '📦',
    rar: '📦'
  };
  return icons[ext] || '📄';
}

// Format file size
function formatFileSize(bytes) {
  if (!bytes || bytes === 0) return 'Unknown size';
  const k = 1024;
  const sizes = ['Bytes', 'KB', 'MB', 'GB'];
  const i = Math.floor(Math.log(bytes) / Math.log(k));
  return Math.round(bytes / Math.pow(k, i) * 100) / 100 + ' ' + sizes[i];
}

// Format date
function formatDate(dateString) {
  if (!dateString) return 'Unknown date';
  try {
    const date = new Date(dateString);
    const now = new Date();
    const diffTime = Math.abs(now - date);
    const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));

    if (diffDays === 0) return 'Today';
    if (diffDays === 1) return 'Yesterday';
    if (diffDays < 7) return diffDays + ' days ago';
    if (diffDays < 30) return Math.floor(diffDays / 7) + ' weeks ago';
    if (diffDays < 365) return Math.floor(diffDays / 30) + ' months ago';

    return date.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
  } catch (e) {
    return 'Unknown date';
  }
}

// Get unique courses from the selected program
function updateCourseFilter() {
  const filterSelect = document.getElementById('filterByCourse');
  const courses = [...new Set(allNotes.map(note => note.course || note.courseName || note.subject || ''))].filter(c => c);
  availableCourses = courses.sort();

  filterSelect.innerHTML = '<option value="all">All Courses</option>';
  availableCourses.forEach(course => {
    const option = document.createElement('option');
    option.value = course;
    option.textContent = course;
    filterSelect.appendChild(option);
  });
}

// Load notes for the program
async function loadNotes() {
  if (!programName) {
    window.location.href = 'programs.html';
    return;
  }

  // Update header
  document.getElementById('programTitle').textContent = programName;

  // Show loading state
  const notesList = document.getElementById('notesList');
  notesList.innerHTML = '<div class="loading"><div class="spinner"></div><p>Loading notes...</p></div>';

  try {
    const res = await fetch('/api/metadata');
    const data = await res.json();
    const files = Array.isArray(data) ? data : (data.files || []);

    // Filter files for this program (FILTER BY PROGRAM)
    allNotes = files.filter(f => {
      if (!f.program) return false;
      const normalized = normalizeText(f.program);
      const searchNormalized = normalizeText(programName);
      return normalized === searchNormalized || normalized.includes(searchNormalized);
    });

    filteredNotes = [...allNotes];

    // Update count
    const count = allNotes.length;
    document.getElementById('notesCount').textContent = count + ' ' + (count === 1 ? 'Note' : 'Notes') + ' Available';
    document.getElementById('programSubtitle').textContent = count + ' ' + (count === 1 ? 'file' : 'files') + ' shared';

    // Update course filter dropdown
    updateCourseFilter();

    // Display notes
    sortAndDisplayNotes();
  } catch (err) {
    console.error('Failed to load notes:', err);
    notesList.innerHTML = '<div class="empty-state"><div class="empty-state-icon">❌</div><p>Failed to load notes. Please try again later.</p></div>';
  }
}

// Sort and display notes
function sortAndDisplayNotes() {
  const sortBy = document.getElementById('sortBy').value;

  // Sort
  filteredNotes.sort((a, b) => {
    switch (sortBy) {
      case 'newest':
        return new Date(b.uploadedAt || 0) - new Date(a.uploadedAt || 0);
      case 'oldest':
        return new Date(a.uploadedAt || 0) - new Date(b.uploadedAt || 0);
      case 'name':
        return (a.fileName || '').localeCompare(b.fileName || '');
      case 'name-desc':
        return (b.fileName || '').localeCompare(a.fileName || '');
      default:
        return 0;
    }
  });

  displayNotes(filteredNotes);
}

// Display notes
function displayNotes(notes) {
  const container = document.getElementById('notesList');
  container.innerHTML = '';

  if (!notes.length) {
    container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📭</div><p>No notes found.<br>Try adjusting your filters.</p></div>';
    return;
  }

  notes.forEach(note => {
    // Handle multiple possible property name variations
    const fileName = note.fileName || note.filename || note.name || note.title || 'Untitled';
    const fileUrl = note.fileUrl || note.url || note.fileURL || note.link || note.downloadUrl || note.downloadURL;
    const course = note.course || note.courseName || note.subject || '';
    const uploader = note.uploadedBy || note.uploader || note.uploaderName || note.author || '';
    const uploadDate = note.uploadedAt || note.uploadDate || note.createdAt || note.date || '';
    const fileSize = note.fileSize || note.size || 0;

    const card = document.createElement('div');
    card.className = 'note-card';

    const fileIcon = document.createElement('div');
    fileIcon.className = 'file-icon';
    fileIcon.textContent = getFileIcon(fileName);

    const fileNameDiv = document.createElement('div');
    fileNameDiv.className = 'file-name';
    fileNameDiv.textContent = fileName;

    const typeBadge = document.createElement('div');
    typeBadge.className = 'badge';
    typeBadge.textContent = getFileExtension(fileName).toUpperCase();

    const fileMeta = document.createElement('div');
    fileMeta.className = 'file-meta';

    // Course info
    if (course) {
      const courseItem = document.createElement('div');
      courseItem.className = 'file-meta-item';
      courseItem.innerHTML = '<span>📚 ' + course + '</span>';
      fileMeta.appendChild(courseItem);
    }

    // Uploader info
    if (uploader) {
      const uploaderItem = document.createElement('div');
      uploaderItem.className = 'file-meta-item';
      uploaderItem.innerHTML = '<span>👤 ' + uploader + '</span>';
      fileMeta.appendChild(uploaderItem);
    }

    // Date info
    const dateItem = document.createElement('div');
    dateItem.className = 'file-meta-item';
    dateItem.innerHTML = '<span>📅 ' + formatDate(uploadDate) + '</span>';
    fileMeta.appendChild(dateItem);

    // Size info
    if (fileSize) {
      const sizeItem = document.createElement('div');
      sizeItem.className = 'file-meta-item';
      sizeItem.innerHTML = '<span>💾 ' + formatFileSize(fileSize) + '</span>';
      fileMeta.appendChild(sizeItem);
    }

 // Action buttons
    const actions = document.createElement('div');
    actions.className = 'card-actions';

    const viewBtn = document.createElement('a');
    viewBtn.className = 'btn btn-view';
    viewBtn.innerHTML = '👁️ View';
    viewBtn.href = fileUrl || '#';
    viewBtn.target = '_blank';
    viewBtn.onclick = (e) => {
      if (!fileUrl || fileUrl === '#') {
        e.preventDefault();
        alert('File preview not available');
      }
    };

    const downloadBtn = document.createElement('a');
    downloadBtn.className = 'btn btn-download';
    downloadBtn.innerHTML = '⬇️ Download';
    downloadBtn.href = fileUrl || '#';
    downloadBtn.download = fileName;
    downloadBtn.onclick = (e) => {
      if (!fileUrl || fileUrl === '#') {
        e.preventDefault();
        alert('Download not available');
      }
    };

    actions.appendChild(viewBtn);
    actions.appendChild(downloadBtn);

    card.appendChild(fileIcon);
    card.appendChild(fileNameDiv);
    card.appendChild(typeBadge);
    card.appendChild(fileMeta);
    card.appendChild(actions);

    container.appendChild(card);
  });
}

// SEARCH BY COURSE NAME (CASE INSENSITIVE)
let searchDebounce;
document.getElementById('notesSearch').addEventListener('input', function() {
  clearTimeout(searchDebounce);
  searchDebounce = setTimeout(() => {
    const query = normalizeText(this.value);
    const selectedCourse = document.getElementById('filterByCourse').value;

    // First filter by course if selected
    let tempFiltered = allNotes;
    if (selectedCourse !== 'all') {
      tempFiltered = allNotes.filter(note => {
        const noteCourse = note.course || note.courseName || note.subject || '';
        return noteCourse === selectedCourse;
      });
    }

    // Then filter by search query (course name only, case insensitive)
    if (!query) {
      filteredNotes = tempFiltered;
    } else {
      filteredNotes = tempFiltered.filter(note => {
        const courseName = normalizeText(note.course || note.courseName || note.subject || '');
        return courseName.includes(query);
      });
    }

    sortAndDisplayNotes();
  }, 300);
});

// Sort change
document.getElementById('sortBy').addEventListener('change', sortAndDisplayNotes);

// FILTER BY COURSE (ACCORDING TO PROGRAM)
document.getElementById('filterByCourse').addEventListener('change', function() {
  const selectedCourse = this.value;
  const searchQuery = normalizeText(document.getElementById('notesSearch').value);

  // Filter by course
  if (selectedCourse === 'all') {
    filteredNotes = [...allNotes];
  } else {
    filteredNotes = allNotes.filter(note => {
      const noteCourse = note.course || note.courseName || note.subject || '';
      return noteCourse === selectedCourse;
    });
  }

  // Apply search filter if there's a query
  if (searchQuery) {
    filteredNotes = filteredNotes.filter(note => {
      const courseName = normalizeText(note.course || note.courseName || note.subject || '');
      return courseName.includes(searchQuery);
    });
  }

  sortAndDisplayNotes();
});

// Load saved profile picture
window.addEventListener('load', () => {
  const savedPic = localStorage.getItem('userProfilePic');
  if (savedPic) {
    document.getElementById('youProfilePic').src = savedPic;
  }
});

// Initial load
loadNotes();
