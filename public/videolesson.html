<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎥 Video Lessons</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    /* ===== RESET & GLOBAL ===== */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: #f1f5f9;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
    }

    header {
      width: 100%;
      background: linear-gradient(90deg, #0066da, #2ab431);
      color: white;
      padding: 15px;
      font-size: 22px;
      font-weight: 700;
      text-align: center;
      text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .logo-container {
      margin: 20px 0 10px;
      animation: fadeInDown 1s ease;
    }

    .luanar-logo {
      width: 120px;
      height: auto;
      display: block;
      margin: 0 auto;
      transition: transform 0.3s ease;
    }

    .luanar-logo:hover {
      transform: scale(1.1);
    }

    /* Search Bar */
    #searchBar {
      width: 85%;
      max-width: 500px;
      padding: 12px 15px;
      margin: 15px auto;
      border-radius: 25px;
      border: 2px solid #00bcd4;
      font-size: 16px;
      outline: none;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      transition: all 0.3s ease;
    }

    #searchBar:focus {
      border-color: #0066da;
      box-shadow: 0 6px 15px rgba(0,0,0,0.2);
    }

    /* Video Player */
    .player {
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(5px);
      border-radius: 16px;
      padding: 20px;
      width: 90%;
      max-width: 800px;
      margin: 20px auto;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    #mainPlayer {
      width: 100%;
      height: 250px;
      border-radius: 12px;
      border: none;
      box-shadow: 0 8px 20px rgba(0,0,0,0.6);
    }

    #videoTitle {
      margin: 15px 0 5px;
      font-size: 1.4rem;
      color: #fff;
    }

    #videoCategory {
      color: #a5f3fc;
      font-size: 1rem;
    }

    /* Video Grid */
    .video-grid {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 25px;
      width: 100%;
      max-width: 600px;
      padding: 20px 0 50px;
    }

    .video-card {
      background: rgba(255,255,255,0.95);
      padding: 15px;
      border-radius: 15px;
      width: 90%;
      max-width: 500px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
      transform: translateY(30px) scale(0.95);
      opacity: 0;
      transition: transform 0.5s ease, opacity 0.5s ease, box-shadow 0.3s ease;
      cursor: pointer;
    }

    .video-card.visible {
      transform: translateY(0) scale(1);
      opacity: 1;
    }

    .video-card:hover {
      transform: translateY(-5px) scale(1.02);
      box-shadow: 0 12px 30px rgba(0,0,0,0.3);
    }

    .thumbnail {
      width: 100%;
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 12px;
    }

    .thumbnail img {
      width: 100%;
      height: auto;
      display: block;
      transition: transform 0.3s;
    }

    .video-card:hover .thumbnail img {
      transform: scale(1.05);
    }

    .video-info h4 {
      font-weight: 600;
      color: #0f172a;
      margin-bottom: 5px;
      font-size: 1.1rem;
    }

    .video-info p {
      color: #334155;
      font-size: 0.9rem;
    }

    /* Animations */
    @keyframes fadeInDown {
      0% { opacity: 0; transform: translateY(-20px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    /* Responsive */
    @media (min-width: 768px) {
      #mainPlayer { height: 400px; }
    }
  </style>
</head>
<body>

<header>🎥 Video Lessons Hub</header>

<div class="logo-container">
  <img src="images/luanar logo.png" alt="LUANAR Logo" class="luanar-logo" onerror="this.style.display='none'">
</div>

<!-- Search Bar -->
<input type="text" id="searchBar" placeholder="🔍 Search lessons..." oninput="filterVideos()">

<!-- Player -->
<div class="player">
  <iframe id="mainPlayer" src="https://www.youtube.com/embed/lJM4GuUd3Hk" allowfullscreen></iframe>
  <h3 id="videoTitle">How to Study Effectively</h3>
  <p id="videoCategory">Tutorial</p>
</div>

<!-- Video Grid -->
<div class="video-grid" id="videoList"></div>

<script>
  (function() {
    // ----- Video Data -----
    const videos = [
      { title: "How to Study Effectively", youtubeId: "lJM4GuUd3Hk", category: "Tutorial", date: "2023-07-20" },
      { title: "Past Exam Review 2022", youtubeId: "utEMUiC59F4", category: "Exam Prep", date: "2022-11-01" },
      { title: "Excel Skills Basics", youtubeId: "DW4rItB20h4", category: "Skills", date: "2024-02-15" },
      { title: "Recorded Lecture: Biology", youtubeId: "046-DygKrhc", category: "Recorded Lecture", date: "2023-05-10" },
    ];

    // DOM elements
    const container = document.getElementById('videoList');
    const player = document.getElementById('mainPlayer');
    const titleEl = document.getElementById('videoTitle');
    const categoryEl = document.getElementById('videoCategory');
    const searchInput = document.getElementById('searchBar');

    // ----- Render videos (filtered list) -----
    function renderVideos(list) {
      container.innerHTML = '';
      list.forEach(video => {
        const card = document.createElement('div');
        card.className = 'video-card';
        card.setAttribute('data-id', video.youtubeId);
        card.innerHTML = `
          <div class="thumbnail">
            <img src="https://img.youtube.com/vi/${video.youtubeId}/hqdefault.jpg" alt="${video.title}" loading="lazy">
          </div>
          <div class="video-info">
            <h4>${video.title}</h4>
            <p>${video.category}</p>
          </div>
        `;
        // Click to play
        card.addEventListener('click', () => playVideo(video));
        container.appendChild(card);
      });

      // Re-run observer for new cards
      observeVideos();
    }

    // ----- Play video in main player -----
    function playVideo(video) {
      player.src = `https://www.youtube.com/embed/${video.youtubeId}?autoplay=1`;
      titleEl.textContent = video.title;
      categoryEl.textContent = video.category;
    }

    // ----- Filter videos based on search input -----
    window.filterVideos = function() {
      const term = searchInput.value.toLowerCase();
      const filtered = videos.filter(v => v.title.toLowerCase().includes(term));
      renderVideos(filtered);
    };

    // ----- Intersection Observer for fade-in effect -----
    function observeVideos() {
      const cards = document.querySelectorAll('.video-card');
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            entry.target.classList.add('visible');
            observer.unobserve(entry.target); // only once
          }
        });
      }, { threshold: 0.2 });

      cards.forEach(card => observer.observe(card));
    }

    // ----- Initial render -----
    renderVideos(videos);

    // Optionally set first video as default (already done in HTML)
    // If you want to sync player with first video, uncomment:
    // if (videos.length) playVideo(videos[0]);
  })();
</script>
</body>
</html>
